<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster — BLZante Toolbox</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap');
:root { --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #e8e8e8; --muted: #777; --accent: #e8c547; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Syne Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.3; pointer-events: none; z-index: 0; }
nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; border-bottom: 1px solid var(--border); position: relative; z-index: 1; }
.nav-logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: 0.08em; display: flex; align-items: center; gap: 10px; }
.nav-logo-img { height: 28px; width: auto; display: block; }
.nav-right { display: flex; align-items: center; gap: 12px; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }
.nav-back { color: var(--muted); text-decoration: none; transition: color 0.15s; }
.nav-back:hover { color: #fff; }
.nav-sep { color: var(--border); }
.container { max-width: 900px; margin: 0 auto; padding: 40px 40px 60px; position: relative; z-index: 1; flex: 1; width: 100%; }
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
.header-row h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; }
.add-link { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); color: var(--text); text-decoration: none; transition: all 0.2s; }
.add-link:hover { border-color: #555; }
.loading { text-align: center; padding: 48px; color: var(--muted); font-size: 0.78rem; }

/* Roster list */
.roster-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }
.roster-section-header {
  font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
  margin-top: 28px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
}
.roster-section-header:first-of-type { margin-top: 0; }
.roster-entry { background: var(--bg); }
.roster-entry:hover { background: #111; }

.entry-header { display: flex; align-items: center; padding: 14px 16px; gap: 12px; cursor: pointer; user-select: none; }
.entry-chevron { font-size: 1.1rem; color: var(--muted); transition: transform 0.2s; width: 14px; text-align: center; flex-shrink: 0; }
.roster-entry.open .entry-chevron { transform: rotate(90deg); color: #fff; }
.entry-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; color: #fff; flex: 1; }
.entry-types { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.04em; }
.entry-btns { display: flex; gap: 6px; flex-shrink: 0; }
.entry-btn { font-family: 'Syne Mono', monospace; font-size: 0.58rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 10px; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; text-decoration: none; transition: all 0.15s; }
.entry-btn:hover { border-color: #555; color: var(--text); }
.entry-btn.pdf { color: var(--accent); border-color: #4a3e10; }
.entry-btn.pdf:hover { border-color: var(--accent); }

/* Expanded card */
.entry-card { display: none; padding: 0 16px 20px 42px; }
.roster-entry.open .entry-card { display: block; }

.card-inner {
  position: relative; border: 1px solid var(--border);
  max-width: 500px; display: flex; flex-direction: column;
}
.card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.2; z-index: 0; }
.card-content { position: relative; z-index: 1; padding: 24px; flex: 1; display: flex; flex-direction: column; }
.card-socials-top { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; z-index: 2; }
.card-socials-top .social-link { width: 30px; height: 30px; }
.card-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 8px; }
.card-photo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }
.card-photo-ph { width: 72px; height: 72px; border-radius: 50%; background: #222; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: #555; }
.card-name { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: #fff; }
.card-types { font-size: 0.58rem; color: var(--muted); margin-top: 2px; }
.card-skills { font-size: 0.54rem; color: #666; margin-top: 2px; }

/* Playlist button */
.playlist-btn {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
  padding: 6px 14px; border: 1px solid rgba(255,0,0,0.35); background: rgba(255,0,0,0.06);
  color: #ccc; font-family: 'Syne Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.06em; text-decoration: none; transition: all 0.15s;
}
.playlist-btn:hover { background: rgba(255,0,0,0.18); }
.playlist-btn svg { flex-shrink: 0; }

/* Bio frame */
.card-bio {
  font-size: 0.7rem; color: #d0d0d0; line-height: 1.6; margin: 10px 0;
  padding: 12px 16px; text-align: center; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
}

/* Section titles */
.card-section-title {
  font-family: 'Syne', sans-serif; font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: #bbb;
  margin: 12px 0 6px; padding-top: 10px; padding-bottom: 4px;
  border-top: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06);
}

.card-placements { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.pl-tag { font-size: 0.58rem; color: var(--text); padding: 3px 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); }

.card-majors { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.major-block { display: flex; gap: 6px; align-items: center; border: 1px solid var(--border); padding: 4px 8px; }
.major-art { width: 36px; height: 36px; object-fit: cover; }
.major-info { font-size: 0.58rem; color: #aaa; line-height: 1.3; }
.major-info strong { color: #fff; }
.listen-link { display: inline-flex; align-items: center; gap: 3px; color: var(--accent); font-size: 0.5rem; text-decoration: none; margin-top: 2px; opacity: 0.8; transition: opacity 0.15s; }
.listen-link:hover { opacity: 1; }

.card-specials { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
.special-item { font-size: 0.58rem; color: #ccc; padding: 3px 0; }

/* Special export modal */
.se-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: center; justify-content: center; }
.se-modal { background: var(--bg); border: 1px solid var(--border); width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 28px; }
.se-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; color: #fff; margin-bottom: 16px; }
.se-section { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin: 16px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.se-check { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; font-size: 0.72rem; color: var(--text); }
.se-check input { accent-color: var(--accent); }
.se-input { width: 100%; font-family: 'Syne Mono', monospace; font-size: 0.78rem; padding: 10px 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; margin-top: 4px; }
.se-input:focus { border-color: #555; }
.se-textarea { width: 100%; font-family: 'Syne Mono', monospace; font-size: 0.78rem; padding: 10px 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; margin-top: 4px; resize: vertical; min-height: 60px; line-height: 1.5; }
.se-btns { display: flex; gap: 8px; margin-top: 20px; }
.se-btn { flex: 1; padding: 12px; font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border: none; cursor: pointer; }
.se-btn-go { background: linear-gradient(135deg, #fff, #bbb); color: #0a0a0a; }
.se-btn-go:hover { opacity: 0.85; }
.se-btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.se-btn-cancel:hover { border-color: #555; color: var(--text); }

.card-certs { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.cert-tag { display: flex; align-items: center; gap: 6px; font-size: 0.58rem; color: var(--accent); padding: 3px 8px; border: 1px solid #4a3e10; }
.cert-art { width: 24px; height: 24px; object-fit: cover; }

.social-link { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: 1px solid rgba(255,255,255,0.15); color: #ddd; transition: all 0.15s; }
.social-link:hover { border-color: #fff; color: #fff; }

@media (max-width: 560px) {
  nav { padding: 16px 20px; }
  .container { padding: 28px 20px 40px; }
  .entry-card { padding-left: 16px; }
  .card-inner { max-width: 100%; }
}

/* PDF render (hidden) — A4 portrait proportions */
#pdfRender {
  position: fixed; left: -9999px; top: 0; z-index: -1;
  width: 794px; height: 1123px; /* A4 ratio */
  background: #0a0a0a; color: #e8e8e8;
  font-family: 'Syne', Arial, sans-serif; overflow: hidden;
}
.pdf-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.2; }
.pdf-content { position: relative; z-index: 1; padding: 40px; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
.pdf-top { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 12px; }
.pdf-photo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #262626; flex-shrink: 0; }
.pdf-photo-ph { width: 90px; height: 90px; border-radius: 50%; background: #222; border: 3px solid #262626; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 800; color: #555; }
.pdf-name { font-size: 1.8rem; font-weight: 800; color: #fff; line-height: 1.2; }
.pdf-types { font-size: 0.75rem; color: #888; margin-top: 4px; }
.pdf-skills { font-size: 0.68rem; color: #666; margin-top: 3px; }
.pdf-playlist { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 8px 16px; border: 1px solid rgba(255,0,0,0.35); background: rgba(255,0,0,0.06); color: #ccc; font-size: 0.68rem; font-family: 'Syne Mono', monospace; text-decoration: none; }
.pdf-bio { font-size: 0.76rem; color: #d0d0d0; line-height: 1.7; font-family: 'Syne Mono', monospace; text-align: center; margin: 16px 0; padding: 16px 22px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
.pdf-context { font-size: 0.82rem; color: #fff; line-height: 1.6; font-family: 'Syne', Arial, sans-serif; font-weight: 600; text-align: center; margin: 12px 0; padding: 18px 24px; background: rgba(232,197,71,0.08); border: 1px solid rgba(232,197,71,0.3); letter-spacing: 0.02em; }
.pdf-section-label { font-size: 0.7rem; color: #bbb; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; margin: 18px 0 8px; padding-top: 14px; padding-bottom: 5px; border-top: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06); }
.pdf-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.pdf-tag { font-size: 0.66rem; color: #ddd; padding: 4px 10px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); font-family: 'Syne Mono', monospace; }
.pdf-majors { display: flex; gap: 8px; flex-wrap: wrap; }
.pdf-major { display: flex; gap: 8px; align-items: center; border: 1px solid #333; padding: 6px 10px; }
.pdf-major img { width: 44px; height: 44px; object-fit: cover; }
.pdf-major-info { font-size: 0.66rem; color: #aaa; line-height: 1.3; }
.pdf-major-info strong { color: #fff; }
.pdf-certs { display: flex; flex-direction: column; gap: 4px; }
.pdf-cert { display: flex; align-items: center; gap: 8px; font-size: 0.64rem; color: #e8c547; padding: 4px 10px; border: 1px solid #4a3e10; font-family: 'Syne Mono', monospace; }
.pdf-cert img { width: 30px; height: 30px; object-fit: cover; }
.pdf-cert-emoji { font-size: 1rem; }
.pdf-socials { position: absolute; top: 40px; right: 40px; display: flex; gap: 12px; z-index: 2; }
.pdf-socials a { color: #ddd; }
.pdf-socials svg { width: 30px; height: 30px; }
.pdf-footer { display: flex; justify-content: center; margin-top: auto; padding-top: 16px; }
.pdf-footer img { height: 70px; width: auto; opacity: 0.6; }

</style>
</head>

<script>
const DB = 'https://blzante-toolbox-default-rtdb.europe-west1.firebasedatabase.app';

function t(key, lang) {
  const l = lang || currentLang;
  const entry = I18N[key];
  if (!entry) return key;
  return entry[l] || entry['fr'] || key;
}

function tType(val, lang) { return t(val, lang); }
function tSkill(val, lang) { return t(val, lang); }
function tCertLevel(val, lang) { return t(val, lang); }

function translateLabels(typesArr, skillsArr, lang) {
  const l = lang || currentLang;
  const translatedTypes = typesArr.map(v => tType(v, l));
  const translatedSkills = skillsArr.map(v => tSkill(v, l));
  return { types: translatedTypes, skills: translatedSkills };
}

function buildCertLabel(c, lang) {
  const l = lang || currentLang;
  return [c.artist, c.project, c.type, tCertLevel(c.level, l)].filter(Boolean).join(' — ');
}

function playlistText(artistName, lang) {
  const l = lang || currentLang;
  if (l === 'en') return `Listen to ${artistName}'s playlist`;
  return 'Écouter la playlist';
}

function rerenderRoster() {
  if (!window._renderRoster) return;
  window._renderRoster();
  // Update header buttons
  document.getElementById('teamBtn').textContent = currentLang === 'fr' ? '⚡ Créer une équipe' : '⚡ Create a Team';
  // Update lang toggle
  document.getElementById('langToggle').textContent = currentLang === 'fr' ? 'EN' : 'FR';
}


(async () => {
  try {
    const res = await fetch(DB + '/roster.json');
    const data = await res.json();
    const content = document.getElementById('rosterContent');
    if (!data) { content.innerHTML = `<div class="loading">${t('aucun_artiste')}<br><a href="roster_create.html" style="color:var(--accent)">${t('creer_fiche')}</a></div>`; return; }
    const allArtists = Object.values(data).sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    const artistesInterpretes = allArtists.filter(a => {
      const tp = a.types ? (Array.isArray(a.types) ? a.types : [a.types]) : [];
      return tp.includes('Artiste Interprète');
    });
    const songwriters = allArtists.filter(a => {
      const tp = a.types ? (Array.isArray(a.types) ? a.types : [a.types]) : [];
      return tp.includes('Auteur') || tp.includes('Compositeur') || tp.includes('Topliner');
    });

    // Store artists for PDF
    window._rosterArtists = {};
    allArtists.forEach(a => { window._rosterArtists[a.id] = a; });

    function getBgSrc(a) {
      const bgs = a.bgImages ? (Array.isArray(a.bgImages) ? a.bgImages : Object.values(a.bgImages)) : [];
      const primaryBg = bgs.find(i => i.primary) || bgs[0];
      if (primaryBg) return primaryBg.src;
      if (a.bg) return a.bg;
      const imgs = a.images ? (Array.isArray(a.images) ? a.images : Object.values(a.images)) : [];
      const fallback = imgs.length > 1 ? (imgs.find(i => !i.primary) || imgs[0]) : null;
      return fallback ? fallback.src : DEFAULT_BG;
    }

    function renderEntry(a) {
      const types = a.types ? (Array.isArray(a.types) ? a.types : [a.types]) : [];
      const skills = a.skills ? (Array.isArray(a.skills) ? a.skills : [a.skills]) : [];
      const { types: trTypes, skills: trSkills } = translateLabels(types, skills);
      const allLabels = [...trTypes, ...trSkills].join(' · ');
      const imgs = a.images ? (Array.isArray(a.images) ? a.images : Object.values(a.images)) : [];
      const primary = imgs.find(i => i.primary) || imgs[0];
      const bgSrc = getBgSrc(a);
      const placements = a.placements ? (Array.isArray(a.placements) ? a.placements : Object.values(a.placements)) : [];
      const majors = a.majors ? (Array.isArray(a.majors) ? a.majors : Object.values(a.majors)) : [];
      const discography = a.discography ? (Array.isArray(a.discography) ? a.discography : Object.values(a.discography)) : [];
      const certs = a.certs ? (Array.isArray(a.certs) ? a.certs : Object.values(a.certs)) : [];
      const initial = (a.name || '?')[0];
      const socials = ['instagram','tiktok','spotify','ytChannel'].filter(k => a[k]);

      let h = `<div class="roster-entry" data-id="${a.id}">`;
      h += `<div class="entry-header"><span class="entry-chevron">›</span>`;
      h += `<div style="flex:1;min-width:0"><div class="entry-name">${a.name}</div>`;
      if (allLabels) h += `<div class="entry-types">${allLabels}</div>`;
      h += `</div><div class="entry-btns">`;
      h += `<button class="entry-btn pdf" data-id="${a.id}" data-lang="fr" title="PDF FR">FR</button>`;
      h += `<button class="entry-btn pdf" data-id="${a.id}" data-lang="en" title="PDF EN">EN</button>`;
      h += `<button class="entry-btn" data-seid="${a.id}" title="${t('export_perso')}">Special</button>`;
      h += `<a class="entry-btn" href="roster_create.html?edit=${a.id}">edit</a>`;
      h += `</div></div>`;

      h += `<div class="entry-card"><div class="card-inner">`;
      if (bgSrc) h += `<div class="card-bg" style="background-image:url('${bgSrc}')"></div>`;

      if (socials.length) {
        h += `<div class="card-socials-top">`;
        socials.forEach(k => {
          const title = k === 'ytChannel' ? 'YouTube' : k.charAt(0).toUpperCase() + k.slice(1);
          h += `<a class="social-link" href="${a[k]}" target="_blank" title="${title}">${SOCIAL_ICONS[k]}</a>`;
        });
        h += `</div>`;
      }

      h += `<div class="card-content"><div class="card-top">`;
      if (primary) h += `<img class="card-photo" src="${primary.src}" />`;
      else h += `<div class="card-photo-ph">${initial}</div>`;
      h += `<div><div class="card-name">${a.name}</div>`;
      if (trTypes.length) h += `<div class="card-types">${trTypes.join(' · ')}</div>`;
      if (trSkills.length) h += `<div class="card-skills">${trSkills.join(' · ')}</div>`;
      h += `</div></div>`;

      if (a.youtube) {
        h += `<a class="playlist-btn" href="${a.youtube}" target="_blank">`;
        h += `<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
        h += `${playlistText(a.name)} ${SOCIAL_ICONS.youtube}</a>`;
      }

      const displayBio = (currentLang === 'en' && a.bioEn) ? a.bioEn : a.bio;
      if (displayBio) h += `<div class="card-bio">${displayBio}</div>`;

      if (discography.length) {
        const sortedDisco = [...discography].sort((a, b) => {
          const [am, ay] = (a.date || '00/0000').split('/'); const [bm, by] = (b.date || '00/0000').split('/');
          return (by + bm).localeCompare(ay + am);
        });
        h += `<div class="card-section-title">${t('discographie')}</div><div class="card-majors">`;
        sortedDisco.forEach(d => {
          h += `<div class="major-block">`;
          if (d.artwork) h += `<img class="major-art" src="${d.artwork}" />`;
          h += `<div class="major-info"><strong>${d.artist || ''}</strong><br>${d.title || ''}`;
          if (d.date) h += `<br><span style="color:#666;font-size:0.52rem">${d.date}</span>`;
          if (d.link) h += `<br><a class="listen-link" href="${d.link}" target="_blank">▶ ${t('ecouter')}</a>`;
          h += `</div></div>`;
        });
        h += `</div>`;
      }

      if (placements.length) {
        const sorted = [...placements].map(p => typeof p === 'string' ? p : p.name || '').filter(Boolean).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
        h += `<div class="card-section-title">${t('artistes_places')}</div><div class="card-placements">`;
        sorted.forEach(n => { h += `<span class="pl-tag">${n}</span>`; });
        h += `</div>`;
      }

      if (majors.length) {
        h += `<div class="card-section-title">${t('placements_majeurs')}</div><div class="card-majors">`;
        majors.forEach(m => {
          h += `<div class="major-block">`;
          if (m.artwork) h += `<img class="major-art" src="${m.artwork}" />`;
          h += `<div class="major-info"><strong>${m.artist || ''}</strong><br>${m.title || ''}`;
          if (m.link) h += `<br><a class="listen-link" href="${m.link}" target="_blank">▶ ${t('ecouter')}</a>`;
          h += `</div></div>`;
        });
        h += `</div>`;
      }

      if (certs.length) {
        const CERT_EMOJI = { 'Or': '🥇', 'Platine': '🥈', 'Diamant': '💎' };
        const CERT_ORDER = { 'Diamant': 0, 'Platine': 1, 'Or': 2 };
        const sortedCerts = [...certs].sort((a, b) => (CERT_ORDER[a.level] ?? 9) - (CERT_ORDER[b.level] ?? 9));
        const singles = sortedCerts.filter(c => c.type === 'Single');
        const albums = sortedCerts.filter(c => c.type === 'Album');
        const other = sortedCerts.filter(c => c.type !== 'Single' && c.type !== 'Album');
        const renderCertGroup = (title, list) => {
          if (!list.length) return '';
          let out = `<div class="card-section-title">${title}</div><div class="card-certs">`;
          list.forEach(c => {
            const emoji = CERT_EMOJI[c.level] || '';
            out += `<span class="cert-tag">`;
            if (c.artwork) out += `<img class="cert-art" src="${c.artwork}" />`;
            else if (emoji) out += `<span style="font-size:1rem">${emoji}</span>`;
            out += buildCertLabel(c) + `</span>`;
          });
          return out + '</div>';
        };
        h += renderCertGroup(t('cert_singles'), singles);
        h += renderCertGroup(t('cert_albums'), albums);
        h += renderCertGroup(t('cert_autres'), other);
      }

      const specials = a.specialInfo ? (Array.isArray(a.specialInfo) ? a.specialInfo : Object.values(a.specialInfo)) : [];
      const specialsEn = a.specialInfoEn ? (Array.isArray(a.specialInfoEn) ? a.specialInfoEn : Object.values(a.specialInfoEn)) : [];
      const displaySpecials = specials.map((s, i) => (currentLang === 'en' && specialsEn[i]) ? specialsEn[i] : s);
      if (displaySpecials.some(s => s)) {
        h += `<div class="card-section-title">${t('infos_speciales')}</div>`;
        h += `<div class="card-specials">`;
        displaySpecials.forEach(s => { if (s) h += `<div class="special-item">⭐ ${s}</div>`; });
        h += `</div>`;
      }

      h += `</div></div></div></div>`;
      return h;
    }

    function renderAll() {
      // Save open states
      const openIds = new Set();
      content.querySelectorAll('.roster-entry.open').forEach(el => openIds.add(el.dataset.id));

      let html = '';
      if (artistesInterpretes.length) {
        html += `<div class="roster-section-header">${t('artistes')}</div>`;
        html += '<div class="roster-list">';
        artistesInterpretes.forEach(a => { html += renderEntry(a); });
        html += '</div>';
      }
      if (songwriters.length) {
        html += `<div class="roster-section-header">${t('songwriters')}</div>`;
        html += '<div class="roster-list">';
        songwriters.forEach(a => { html += renderEntry(a); });
        html += '</div>';
      }
      content.innerHTML = html;

      // Restore open states
      openIds.forEach(id => {
        const el = content.querySelector(`.roster-entry[data-id="${id}"]`);
        if (el) el.classList.add('open');
      });
    }

    renderAll();
    window._renderRoster = renderAll;

    // Toggle & PDF clicks
    content.addEventListener('click', e => {
      const header = e.target.closest('.entry-header');
      if (header && !e.target.closest('.entry-btn')) {
        header.closest('.roster-entry').classList.toggle('open');
      }
      const pdfBtn = e.target.closest('.entry-btn.pdf');
      if (pdfBtn) {
        e.stopPropagation();
        const id = pdfBtn.dataset.id;
        const lang = pdfBtn.dataset.lang || 'fr';
        const a = window._rosterArtists[id];
        if (!a) return;
        pdfBtn.textContent = '⏳';
        const label = lang === 'fr' ? 'FR' : 'EN';
        generatePDF(a, lang).then(() => { pdfBtn.textContent = label; }).catch(err => { console.error(err); alert('Erreur PDF'); pdfBtn.textContent = label; });
      }
      const seBtn = e.target.closest('[data-seid]');
      if (seBtn) {
        e.stopPropagation();
        const id = seBtn.dataset.seid;
        const a = window._rosterArtists[id];
        if (a) openSpecialExport(a);
      }
    });

  } catch(err) { document.getElementById('rosterContent').innerHTML = `<div class="loading">${t('erreur_connexion')}</div>`; }
})();

function openSpecialExport(a) {
  const types = a.types ? (Array.isArray(a.types) ? a.types : [a.types]) : [];
  const skills = a.skills ? (Array.isArray(a.skills) ? a.skills : [a.skills]) : [];
  const ALL_TYPES = ['Auteur', 'Compositeur', 'Topliner', 'Artiste Interprète'];
  const ALL_SKILLS = ['Producer', 'Musicien', 'Musicien Live', 'Directeur Musical', 'Ingénieur Mixage', 'Ingénieur Enregistrement', 'Ingénieur Mastering'];

  const overlay = document.createElement('div');
  overlay.className = 'se-overlay';

  let mh = `<div class="se-modal">`;
  mh += `<div class="se-title">Export spécial — ${a.name}</div>`;

  // Types
  mh += `<div class="se-section">Types d'artiste</div>`;
  ALL_TYPES.forEach(t => {
    mh += `<label class="se-check"><input type="checkbox" data-se="type" value="${t}" ${types.includes(t) ? 'checked' : ''} /> ${t}</label>`;
  });

  // Skills
  mh += `<div class="se-section">Compétences techniques</div>`;
  ALL_SKILLS.forEach(s => {
    mh += `<label class="se-check"><input type="checkbox" data-se="skill" value="${s}" ${skills.includes(s) ? 'checked' : ''} /> ${s}</label>`;
  });

  // Playlist
  mh += `<div class="se-section">Playlist</div>`;
  mh += `<input class="se-input" id="sePlaylist" placeholder="Laisser vide pour utiliser le lien par défaut" value="" />`;
  if (a.youtube) mh += `<div style="font-size:0.58rem;color:#555;margin-top:4px">Par défaut : ${a.youtube}</div>`;

  // Bio
  mh += `<div class="se-section">Bio</div>`;
  mh += `<textarea class="se-textarea" id="seBio">${a.bio || ''}</textarea>`;
  mh += `<div class="se-section">Bio (EN)</div>`;
  mh += `<textarea class="se-textarea" id="seBioEn">${a.bioEn || ''}</textarea>`;
  mh += `<div style="font-size:0.58rem;color:#555;margin-top:4px">Modifier ici ne change pas la fiche originale</div>`;

  // Context field
  mh += `<div class="se-section">Contexte / Context</div>`;
  mh += `<textarea class="se-textarea" id="seContext" placeholder="Ex: Proposition pour le prochain album de X / Proposed for X's next album..."></textarea>`;
  mh += `<div style="font-size:0.58rem;color:#555;margin-top:4px">Texte mis en avant sur la fiche, entre la bio et les placements</div>`;

  // Sections to include
  const discography = a.discography ? (Array.isArray(a.discography) ? a.discography : Object.values(a.discography)) : [];
  const placements = a.placements ? (Array.isArray(a.placements) ? a.placements : Object.values(a.placements)) : [];
  const majors = a.majors ? (Array.isArray(a.majors) ? a.majors : Object.values(a.majors)) : [];
  const certs = a.certs ? (Array.isArray(a.certs) ? a.certs : Object.values(a.certs)) : [];
  const specials = a.specialInfo ? (Array.isArray(a.specialInfo) ? a.specialInfo : Object.values(a.specialInfo)) : [];

  // --- Discographie (section toggle) ---
  mh += `<div class="se-section">Discographie</div>`;
  if (discography.length) {
    mh += `<label class="se-check"><input type="checkbox" data-se="section" value="discography" checked /> Inclure la discographie</label>`;
  } else {
    mh += `<label class="se-check" style="opacity:0.4"><input type="checkbox" data-se="section" value="discography" disabled /> Discographie (vide)</label>`;
  }

  // --- Artistes placés (individual checkboxes) ---
  mh += `<div class="se-section">Artistes placés</div>`;
  if (placements.length) {
    const sortedPl = [...placements].map((p, i) => ({ name: typeof p === 'string' ? p : p.name || '', idx: i })).filter(p => p.name).sort((a, b) => a.name.localeCompare(b.name));
    sortedPl.forEach(p => {
      mh += `<label class="se-check"><input type="checkbox" data-se="placement" value="${p.idx}" checked /> ${p.name}</label>`;
    });
  } else {
    mh += `<div style="font-size:0.6rem;color:#555;padding:4px 0">Aucun artiste placé</div>`;
  }

  // --- Placements majeurs (individual checkboxes) ---
  mh += `<div class="se-section">Placements majeurs</div>`;
  if (majors.length) {
    majors.forEach((m, i) => {
      const label = [m.artist, m.title].filter(Boolean).join(' — ');
      mh += `<label class="se-check"><input type="checkbox" data-se="major" value="${i}" checked /> ${label || 'Placement ' + (i+1)}</label>`;
    });
  } else {
    mh += `<div style="font-size:0.6rem;color:#555;padding:4px 0">Aucun placement majeur</div>`;
  }

  // --- Certifications (individual checkboxes) ---
  mh += `<div class="se-section">Certifications</div>`;
  if (certs.length) {
    const CERT_EMOJI_SE = { 'Or': '🥇', 'Platine': '🥈', 'Diamant': '💎' };
    certs.forEach((c, i) => {
      const emoji = CERT_EMOJI_SE[c.level] || '';
      const label = buildCertLabel(c);
      mh += `<label class="se-check"><input type="checkbox" data-se="cert" value="${i}" checked /> ${emoji ? emoji + ' ' : ''}${label}</label>`;
    });
  } else {
    mh += `<div style="font-size:0.6rem;color:#555;padding:4px 0">Aucune certification</div>`;
  }

  // --- Informations spéciales (section toggle) ---
  mh += `<div class="se-section">Informations spéciales</div>`;
  if (specials.length) {
    mh += `<label class="se-check"><input type="checkbox" data-se="section" value="specials" checked /> Inclure les informations spéciales</label>`;
  } else {
    mh += `<label class="se-check" style="opacity:0.4"><input type="checkbox" data-se="section" value="specials" disabled /> Informations spéciales (vide)</label>`;
  }

  // Language selector
  mh += `<div class="se-section">Langue / Language</div>`;
  mh += `<div style="display:flex;gap:8px">`;
  mh += `<label class="se-check"><input type="radio" name="seLang" value="fr" checked /> Français</label>`;
  mh += `<label class="se-check"><input type="radio" name="seLang" value="en" /> English</label>`;
  mh += `</div>`;

  // Buttons
  mh += `<div class="se-btns">`;
  mh += `<button class="se-btn se-btn-cancel" id="seCancel">Annuler</button>`;
  mh += `<button class="se-btn se-btn-go" id="seExport">⚡ Exporter PDF</button>`;
  mh += `</div></div>`;

  overlay.innerHTML = mh;
  document.body.appendChild(overlay);

  overlay.querySelector('#seCancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#seExport').addEventListener('click', async () => {
    // Build custom data without modifying original
    const customTypes = []; overlay.querySelectorAll('[data-se=type]:checked').forEach(cb => customTypes.push(cb.value));
    const customSkills = []; overlay.querySelectorAll('[data-se=skill]:checked').forEach(cb => customSkills.push(cb.value));
    const customPlaylist = overlay.querySelector('#sePlaylist').value.trim();
    const customBio = overlay.querySelector('#seBio').value.trim();
    const customBioEn = overlay.querySelector('#seBioEn').value.trim();
    const customContext = overlay.querySelector('#seContext').value.trim();

    // Section toggles (discography & specials)
    const includedSections = {};
    overlay.querySelectorAll('[data-se=section]').forEach(cb => { includedSections[cb.value] = cb.checked; });

    // Individual item selections
    const selectedPlacementIdx = new Set();
    overlay.querySelectorAll('[data-se=placement]:checked').forEach(cb => selectedPlacementIdx.add(Number(cb.value)));
    const selectedMajorIdx = new Set();
    overlay.querySelectorAll('[data-se=major]:checked').forEach(cb => selectedMajorIdx.add(Number(cb.value)));
    const selectedCertIdx = new Set();
    overlay.querySelectorAll('[data-se=cert]:checked').forEach(cb => selectedCertIdx.add(Number(cb.value)));

    // Filter arrays based on individual selections
    const filteredPlacements = placements.filter((_, i) => selectedPlacementIdx.has(i));
    const filteredMajors = majors.filter((_, i) => selectedMajorIdx.has(i));
    const filteredCerts = certs.filter((_, i) => selectedCertIdx.has(i));

    const customData = {
      ...a,
      types: customTypes,
      skills: customSkills,
      bio: customBio,
      bioEn: customBioEn,
      context: customContext,
      youtube: customPlaylist || a.youtube,
      discography: includedSections.discography ? a.discography : [],
      placements: filteredPlacements,
      majors: filteredMajors,
      certs: filteredCerts,
      specialInfo: includedSections.specials ? a.specialInfo : [],
      specialInfoEn: includedSections.specials ? a.specialInfoEn : [],
    };

    const exportLang = overlay.querySelector('input[name=seLang]:checked').value || 'fr';
    overlay.querySelector('#seExport').textContent = '⏳ Export...';
    try {
      await generatePDF(customData, exportLang);
    } catch(err) { console.error(err); alert('Erreur PDF'); }
    overlay.remove();
  });
}

// ─── Render one artist page into a jsPDF instance ───
async function renderArtistToPDF(a, pdf, render, lang) {
  const pdfLang = lang || 'fr';
  let h = buildArtistCardHTML(a, pdfLang);

  render.innerHTML = h;

  const allImgs = render.querySelectorAll('img');
  await Promise.all(Array.from(allImgs).map(img => {
    if (img.complete) return Promise.resolve();
    return new Promise(res => { img.onload = res; img.onerror = res; });
  }));
  await new Promise(r => setTimeout(r, 200));

  const canvas = await html2canvas(render, {
    width: 794, height: 1123, scale: 2,
    backgroundColor: '#0a0a0a', useCORS: true, allowTaint: true,
  });

  const imgData = canvas.toDataURL('image/jpeg', 0.92);
  pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);

  const scaleX = 210 / 794;
  const scaleY = 297 / 1123;
  render.querySelectorAll('a[href]').forEach(link => {
    const rect = link.getBoundingClientRect();
    const renderRect = render.getBoundingClientRect();
    const x = (rect.left - renderRect.left) * scaleX;
    const y = (rect.top - renderRect.top) * scaleY;
    const w = rect.width * scaleX;
    const ht = rect.height * scaleY;
    if (w > 0 && ht > 0) {
      pdf.link(x, y, w, ht, { url: link.href });
    }
  });
  render.innerHTML = '';
}

// ─── PDF output: download with proper filename + open in new tab for viewing ───
// Download gives the correct filename for saving/sharing.
// New tab lets you view the PDF immediately — links clicked in that tab
// only navigate that tab, the roster page stays open.
function outputPDF(pdf, filename) {
  // 1. Download with correct filename
  const blob = pdf.output('blob');
  const dlUrl = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = dlUrl;
  a.download = filename || 'export.pdf';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(dlUrl), 2000);

  // 2. Open in new tab for immediate viewing (links navigate this tab, not the roster)
  const viewUrl = pdf.output('bloburl');
  window.open(viewUrl, '_blank');
}

// ─── Generate single artist PDF ───
async function generatePDF(a, lang) {
  const render = document.getElementById('pdfRender');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  await renderArtistToPDF(a, pdf, render, lang || 'fr');
  const now = new Date();
  const yyyymmdd = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
  outputPDF(pdf, `${yyyymmdd}_${a.name || 'artiste'}_${(lang || 'fr').toUpperCase()}.pdf`);
}

// ─── Generate team PDF with multiple artists (opens in new tab) ───
async function generateTeamPDF(artists, lang, teamName) {

  const pdfLang = lang || 'fr';
  const tName = teamName || 'Songwriters BLZante';

  render.style.width = '1123px';
  render.style.height = '794px';

  // Layout config: optimize cols for landscape

  const rows = Math.ceil(n / cols);

  h += `<img src="${NAV_LOGO}" style="height:32px;width:auto" crossorigin="anonymous" />`;
  h += `<div style="font-family:Syne,sans-serif;font-size:1.3rem;font-weight:800;color:#fff;letter-spacing:0.04em">${tName}</div>`;
  h += `</div>`;
  h += `<div style="height:1px;background:linear-gradient(90deg,rgba(232,197,71,0.4),rgba(255,255,255,0.08) 50%,transparent);margin:0 ${padX}px;flex-shrink:0"></div>`;

  // Grid of scaled artist cards
  h += `<div style="display:grid;grid-template-columns:repeat(${cols},${cellW}px);gap:${gapY}px ${gapX}px;padding:${padY}px ${padX}px;flex:1;align-content:center;">`;

  for (const a of artists) {
    const cardHTML = buildArtistCardHTML(a, pdfLang, { noFooter: true });
    // Each cell: a clipped container with the full card scaled down
    h += `<div style="width:${cellW}px;height:${cellH}px;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,0.08)">`;
    // Inner: full portrait A4 card, scaled
    h += `<div style="width:794px;height:1123px;position:absolute;top:0;left:0;transform:scale(${scFactor});transform-origin:top left;background:#0a0a0a;font-family:Syne,Arial,sans-serif;color:#e8e8e8;overflow:hidden">`;
    h += cardHTML;
    h += `</div></div>`;
  }

  h += '</div>'; // grid
  h += '</div>'; // content wrapper

  render.innerHTML = h;

  // Wait for images
  const allImgs = render.querySelectorAll('img');
  await Promise.all(Array.from(allImgs).map(img => {
    if (img.complete) return Promise.resolve();
    return new Promise(res => { img.onload = res; img.onerror = res; });
  }));
  await new Promise(r => setTimeout(r, 400));

  const canvas = await html2canvas(render, {
    width: 1123, height: 794, scale: 2,
    backgroundColor: '#0a0a0a', useCORS: true, allowTaint: true,
  });

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const imgData = canvas.toDataURL('image/jpeg', 0.92);
  pdf.addImage(imgData, 'JPEG', 0, 0, 297, 210);

  // Links (adjusted for scale)
  const pdfScaleX = 297 / 1123;

  render.querySelectorAll('a[href]').forEach(link => {

  outputPDF(pdf, `${yyyymmdd}_${tName}_${pdfLang.toUpperCase()}.pdf`);

// ─── Team export modal ───
function openTeamExport() {
  const allArtists = window._rosterArtists ? Object.values(window._rosterArtists) : [];
  const songwriters = allArtists.filter(a => {
    const t = a.types ? (Array.isArray(a.types) ? a.types : [a.types]) : [];
    return t.includes('Auteur') || t.includes('Compositeur') || t.includes('Topliner');
  }).sort((a, b) => (a.name || '').localeCompare(b.name || ''));

  if (!songwriters.length) { alert('Aucun songwriter dans le roster'); return; }

  const overlay = document.createElement('div');
  overlay.className = 'se-overlay';

  let mh = '<div class="se-modal">';
  mh += '<div class="se-title">Créer une équipe — Export PDF</div>';
  mh += '<div class="se-section">Nom de l\'équipe / Team name</div>';
  mh += '<input class="se-input" id="teamName" value="Songwriters BLZante" autocomplete="off" />';
  mh += '<div class="se-section">Sélectionner les songwriters</div>';
  songwriters.forEach((sw, i) => {
    const types = sw.types ? (Array.isArray(sw.types) ? sw.types : [sw.types]) : [];
    const skills = sw.skills ? (Array.isArray(sw.skills) ? sw.skills : [sw.skills]) : [];
    const labels = [...types, ...skills].join(' · ');
    mh += `<label class="se-check"><input type="checkbox" data-se="team-artist" value="${sw.id}" /> <strong>${sw.name}</strong>`;
    if (labels) mh += ` <span style="color:#777;font-size:0.6rem">(${labels})</span>`;
    mh += `</label>`;
  });
  mh += '<div style="margin-top:12px;display:flex;gap:8px">';
  mh += '<button class="se-btn se-btn-cancel" style="flex:0;padding:8px 14px;font-size:0.6rem" id="teamSelectAll">' + t('team_all') + '</button>';
  mh += '<button class="se-btn se-btn-cancel" style="flex:0;padding:8px 14px;font-size:0.6rem" id="teamSelectNone">' + t('team_none') + '</button>';
  mh += '</div>';
  mh += '<div class="se-section">Langue / Language</div>';
  mh += '<div style="display:flex;gap:8px">';
  mh += '<label class="se-check"><input type="radio" name="teamLang" value="fr" checked /> Français</label>';
  mh += '<label class="se-check"><input type="radio" name="teamLang" value="en" /> English</label>';
  mh += '</div>';
  mh += '<div class="se-btns">';
  mh += `<button class="se-btn se-btn-cancel" id="teamCancel">${t('se_annuler')}</button>`;
  mh += `<button class="se-btn se-btn-go" id="teamExport">${t('team_export')}</button>`;
  mh += '</div></div>';

  overlay.innerHTML = mh;
  document.body.appendChild(overlay);

  overlay.querySelector('#teamCancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#teamSelectAll').addEventListener('click', () => {
    overlay.querySelectorAll('[data-se=team-artist]').forEach(cb => cb.checked = true);
  });
  overlay.querySelector('#teamSelectNone').addEventListener('click', () => {
    overlay.querySelectorAll('[data-se=team-artist]').forEach(cb => cb.checked = false);
  });

  overlay.querySelector('#teamExport').addEventListener('click', async () => {
    const selectedIds = [];
    overlay.querySelectorAll('[data-se=team-artist]:checked').forEach(cb => selectedIds.push(cb.value));
    if (!selectedIds.length) { alert('Sélectionner au moins un songwriter'); return; }

    const selectedArtists = selectedIds.map(id => window._rosterArtists[id]).filter(Boolean);
    const selectedLang = overlay.querySelector('input[name=teamLang]:checked').value || 'fr';
    const teamName = overlay.querySelector('#teamName').value.trim() || 'Songwriters BLZante';
    const btn = overlay.querySelector('#teamExport');
    btn.textContent = '⏳ Génération...';
    btn.disabled = true;
    try {
      await generateTeamPDF(selectedArtists, selectedLang, teamName);
    } catch(err) { console.error(err); alert('Erreur PDF'); }
    overlay.remove();
  });
}
