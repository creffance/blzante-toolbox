<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster — BLZante Toolbox</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap');
:root { --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #e8e8e8; --muted: #777; --accent: #e8c547; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Syne Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.3; pointer-events: none; z-index: 0; }
nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; border-bottom: 1px solid var(--border); position: relative; z-index: 1; }
.nav-logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: 0.08em; display: flex; align-items: center; gap: 10px; }
.nav-logo-img { height: 28px; width: auto; display: block; }
.nav-right { display: flex; align-items: center; gap: 12px; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }
.nav-back { color: var(--muted); text-decoration: none; font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; transition: color 0.15s; }
.nav-back:hover { color: #fff; }
.nav-sep { color: var(--border); }
.container { max-width: 1000px; margin: 0 auto; padding: 40px 40px 60px; position: relative; z-index: 1; flex: 1; width: 100%; }

.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
.header-row h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--text); }
.add-btn { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); color: var(--text); text-decoration: none; transition: all 0.2s; }
.add-btn:hover { border-color: #555; color: #fff; }

.loading { text-align: center; padding: 48px; color: var(--muted); font-size: 0.78rem; }

/* Artist cards grid */
.roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2px; }

.artist-card {
  position: relative; overflow: hidden; background: var(--surface);
  border: 1px solid var(--border); min-height: 320px;
  display: flex; flex-direction: column; transition: border-color 0.2s;
}
.artist-card:hover { border-color: #444; }

.card-bg {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  opacity: 0.25; z-index: 0;
}

.card-content { position: relative; z-index: 1; padding: 24px; flex: 1; display: flex; flex-direction: column; }

.card-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
.card-photo {
  width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
  border: 2px solid var(--border); flex-shrink: 0;
}
.card-photo-placeholder {
  width: 64px; height: 64px; border-radius: 50%; background: #222;
  border: 2px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: #555;
}
.card-identity { flex: 1; min-width: 0; }
.card-name { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: #fff; line-height: 1.2; }
.card-types { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.06em; margin-top: 4px; }
.card-skills { font-size: 0.54rem; color: #555; letter-spacing: 0.06em; margin-top: 2px; }

.card-bio { font-size: 0.7rem; color: #aaa; line-height: 1.6; margin-bottom: 14px; flex: 1; }

/* Placements */
.card-placements { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.placement-tag {
  font-size: 0.6rem; color: var(--text); padding: 3px 8px;
  border: 1px solid var(--border); letter-spacing: 0.04em;
}

/* Artworks */
.card-artworks { display: flex; gap: 4px; margin-bottom: 12px; }
.artwork-thumb { width: 48px; height: 48px; object-fit: cover; border: 1px solid var(--border); }

/* Certifications */
.card-certs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.cert-tag {
  font-size: 0.56rem; color: var(--accent); padding: 2px 7px;
  border: 1px solid #4a3e10; letter-spacing: 0.04em;
}

/* Links */
.card-links { display: flex; gap: 8px; margin-top: auto; }
.card-link {
  font-size: 0.58rem; color: var(--muted); text-decoration: none;
  padding: 4px 10px; border: 1px solid var(--border); transition: all 0.15s;
  letter-spacing: 0.06em;
}
.card-link:hover { border-color: #555; color: #fff; }

.card-edit {
  position: absolute; top: 10px; right: 10px; font-size: 0.6rem;
  color: #444; text-decoration: none; letter-spacing: 0.08em;
  text-transform: uppercase; z-index: 2; transition: color 0.15s;
}
.card-edit:hover { color: var(--text); }

@media (max-width: 560px) {
  nav { padding: 16px 20px; }
  .container { padding: 28px 20px 40px; }
  .roster-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<div class="container">
  <div class="header-row">
    <h1>Roster</h1>
    <a class="add-btn" href="roster_create.html">+ Ajouter un artiste</a>
  </div>
  <div id="rosterContent"><div class="loading">Chargement...</div></div>
</div>

<script>
const DB = 'https://blzante-toolbox-default-rtdb.europe-west1.firebasedatabase.app';

(async () => {
  try {
    const res = await fetch(DB + '/roster.json');
    const data = await res.json();
    const content = document.getElementById('rosterContent');

    if (!data) {
      content.innerHTML = '<div class="loading">Aucun artiste pour le moment.<br><a href="roster_create.html" style="color:var(--accent)">Créer une fiche →</a></div>';
      return;
    }

    const artists = Object.values(data).sort((a, b) => (a.name || '').localeCompare(b.name || ''));

    let html = '<div class="roster-grid">';

    artists.forEach(a => {
      const types = a.types ? (Array.isArray(a.types) ? a.types.join(' · ') : a.types) : '';
      const skills = a.skills ? (Array.isArray(a.skills) ? a.skills.join(' · ') : a.skills) : '';
      const placements = a.placements ? (Array.isArray(a.placements) ? a.placements : Object.values(a.placements)) : [];
      const certs = a.certs ? (Array.isArray(a.certs) ? a.certs : Object.values(a.certs)) : [];
      const initial = (a.name || '?')[0].toUpperCase();

      html += `<div class="artist-card">`;
      if (a.bg) html += `<div class="card-bg" style="background-image:url('${a.bg}')"></div>`;
      html += `<a class="card-edit" href="roster_create.html?edit=${a.id}">edit</a>`;
      html += `<div class="card-content">`;

      // Top: photo + name
      html += `<div class="card-top">`;
      if (a.photo) {
        html += `<img class="card-photo" src="${a.photo}" alt="${a.name}" />`;
      } else {
        html += `<div class="card-photo-placeholder">${initial}</div>`;
      }
      html += `<div class="card-identity">`;
      html += `<div class="card-name">${a.name}</div>`;
      if (types) html += `<div class="card-types">${types}</div>`;
      if (skills) html += `<div class="card-skills">${skills}</div>`;
      html += `</div></div>`;

      // Bio
      if (a.bio) html += `<div class="card-bio">${a.bio}</div>`;

      // Placements
      if (placements.length) {
        html += `<div class="card-placements">`;
        placements.forEach(p => {
          if (p.artist) html += `<span class="placement-tag">${p.artist}</span>`;
        });
        html += `</div>`;
      }

      // Artworks
      const artworks = placements.filter(p => p.artwork);
      if (artworks.length) {
        html += `<div class="card-artworks">`;
        artworks.forEach(p => {
          html += `<img class="artwork-thumb" src="${p.artwork}" alt="${p.title || ''}" title="${p.artist} — ${p.title}" />`;
        });
        html += `</div>`;
      }

      // Certs
      if (certs.length) {
        html += `<div class="card-certs">`;
        certs.forEach(c => {
          const t = typeof c === 'string' ? c : c.text || '';
          if (t) html += `<span class="cert-tag">${t}</span>`;
        });
        html += `</div>`;
      }

      // Links
      const links = [];
      if (a.instagram) links.push(`<a class="card-link" href="${a.instagram}" target="_blank">Instagram</a>`);
      if (a.tiktok) links.push(`<a class="card-link" href="${a.tiktok}" target="_blank">TikTok</a>`);
      if (a.spotify) links.push(`<a class="card-link" href="${a.spotify}" target="_blank">Spotify</a>`);
      if (a.ytChannel) links.push(`<a class="card-link" href="${a.ytChannel}" target="_blank">YouTube</a>`);
      if (a.youtube) links.push(`<a class="card-link" href="${a.youtube}" target="_blank">Playlist YT</a>`);
      if (links.length) html += `<div class="card-links">${links.join('')}</div>`;

      html += `</div></div>`;
    });

    html += '</div>';
    content.innerHTML = html;

  } catch (err) {
    document.getElementById('rosterContent').innerHTML = '<div class="loading">⚠ Erreur de connexion</div>';
  }
})();
</script>
</body>
