<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster — BLZante Toolbox</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap');
:root { --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #e8e8e8; --muted: #777; --accent: #e8c547; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Syne Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.3; pointer-events: none; z-index: 0; }
nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; border-bottom: 1px solid var(--border); position: relative; z-index: 1; }
.nav-logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: 0.08em; display: flex; align-items: center; gap: 10px; }
.nav-logo-img { height: 28px; width: auto; display: block; }
.nav-right { display: flex; align-items: center; gap: 12px; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }
.nav-back { color: var(--muted); text-decoration: none; transition: color 0.15s; }
.nav-back:hover { color: #fff; }
.nav-sep { color: var(--border); }
.container { max-width: 900px; margin: 0 auto; padding: 40px 40px 60px; position: relative; z-index: 1; flex: 1; width: 100%; }
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
.header-row h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; }
.add-link { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); color: var(--text); text-decoration: none; transition: all 0.2s; }
.add-link:hover { border-color: #555; }
.loading { text-align: center; padding: 48px; color: var(--muted); font-size: 0.78rem; }

/* Roster list */
.roster-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }
.roster-entry { background: var(--bg); }
.roster-entry:hover { background: #111; }

.entry-header { display: flex; align-items: center; padding: 14px 16px; gap: 12px; cursor: pointer; user-select: none; }
.entry-chevron { font-size: 1.1rem; color: var(--muted); transition: transform 0.2s; width: 14px; text-align: center; flex-shrink: 0; }
.roster-entry.open .entry-chevron { transform: rotate(90deg); color: #fff; }
.entry-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; color: #fff; flex: 1; }
.entry-types { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.04em; }
.entry-btns { display: flex; gap: 6px; flex-shrink: 0; }
.entry-btn { font-family: 'Syne Mono', monospace; font-size: 0.58rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 10px; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; text-decoration: none; transition: all 0.15s; }
.entry-btn:hover { border-color: #555; color: var(--text); }
.entry-btn.pdf { color: var(--accent); border-color: #4a3e10; }
.entry-btn.pdf:hover { border-color: var(--accent); }

/* Expanded card */
.entry-card { display: none; padding: 0 16px 20px 42px; }
.roster-entry.open .entry-card { display: block; }

.card-inner {
  position: relative; overflow: hidden; border: 1px solid var(--border);
  aspect-ratio: 1 / 1; max-width: 500px; display: flex; flex-direction: column;
}
.card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.2; z-index: 0; }
.card-content { position: relative; z-index: 1; padding: 24px; flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
.card-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 8px; }
.card-photo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }
.card-photo-ph { width: 72px; height: 72px; border-radius: 50%; background: #222; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: #555; }
.card-name { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: #fff; }
.card-types { font-size: 0.58rem; color: var(--muted); margin-top: 2px; }
.card-skills { font-size: 0.54rem; color: #666; margin-top: 2px; }

/* Playlist button */
.playlist-btn {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
  padding: 6px 14px; border: 1px solid rgba(255,0,0,0.35); background: rgba(255,0,0,0.06);
  color: #ccc; font-family: 'Syne Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.06em; text-decoration: none; transition: all 0.15s;
}
.playlist-btn:hover { background: rgba(255,0,0,0.18); }
.playlist-btn svg { flex-shrink: 0; }

/* Bio frame */
.card-bio {
  font-size: 0.7rem; color: #d0d0d0; line-height: 1.6; margin: 10px 0;
  padding: 12px 16px; text-align: center; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
}

/* Section titles */
.card-section-title {
  font-family: 'Syne', sans-serif; font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: #888;
  margin: 10px 0 6px; padding-bottom: 3px; border-bottom: 1px solid rgba(255,255,255,0.06);
}

.card-placements { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.pl-tag { font-size: 0.58rem; color: var(--text); padding: 3px 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); }

.card-majors { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.major-block { display: flex; gap: 6px; align-items: center; border: 1px solid var(--border); padding: 4px 8px; }
.major-art { width: 36px; height: 36px; object-fit: cover; }
.major-info { font-size: 0.58rem; color: #aaa; line-height: 1.3; }
.major-info strong { color: #fff; }

.card-certs { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.cert-tag { display: flex; align-items: center; gap: 6px; font-size: 0.58rem; color: var(--accent); padding: 3px 8px; border: 1px solid #4a3e10; }
.cert-art { width: 24px; height: 24px; object-fit: cover; }

.card-socials { display: flex; gap: 8px; margin-top: auto; }
.social-link { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: 1px solid rgba(255,255,255,0.15); color: #ddd; transition: all 0.15s; }
.social-link:hover { border-color: #fff; color: #fff; }

@media (max-width: 560px) {
  nav { padding: 16px 20px; }
  .container { padding: 28px 20px 40px; }
  .entry-card { padding-left: 16px; }
  .card-inner { max-width: 100%; }
}

/* PDF render (hidden) — matches card layout */
#pdfRender {
  position: fixed; left: -9999px; top: 0; z-index: -1;
  width: 800px; height: 800px;
  background: #0a0a0a; color: #e8e8e8;
  font-family: 'Syne', Arial, sans-serif; overflow: hidden;
}
.pdf-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.2; }
.pdf-content { position: relative; z-index: 1; padding: 28px; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
.pdf-top { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 8px; }
.pdf-photo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #262626; flex-shrink: 0; }
.pdf-photo-ph { width: 80px; height: 80px; border-radius: 50%; background: #222; border: 3px solid #262626; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; color: #555; }
.pdf-name { font-size: 1.6rem; font-weight: 800; color: #fff; line-height: 1.2; }
.pdf-types { font-size: 0.7rem; color: #888; margin-top: 3px; }
.pdf-skills { font-size: 0.65rem; color: #666; margin-top: 2px; }
.pdf-playlist { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; padding: 6px 14px; border: 1px solid rgba(255,0,0,0.35); background: rgba(255,0,0,0.06); color: #ccc; font-size: 0.65rem; font-family: 'Syne Mono', monospace; text-decoration: none; }
.pdf-bio { font-size: 0.72rem; color: #d0d0d0; line-height: 1.6; font-family: 'Syne Mono', monospace; text-align: center; margin: 10px 0; padding: 14px 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
.pdf-section-label { font-size: 0.65rem; color: #888; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; margin: 10px 0 5px; padding-bottom: 3px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.pdf-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.pdf-tag { font-size: 0.62rem; color: #ddd; padding: 3px 9px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); font-family: 'Syne Mono', monospace; }
.pdf-majors { display: flex; gap: 6px; flex-wrap: wrap; }
.pdf-major { display: flex; gap: 6px; align-items: center; border: 1px solid #333; padding: 5px 8px; }
.pdf-major img { width: 40px; height: 40px; object-fit: cover; }
.pdf-major-info { font-size: 0.6rem; color: #aaa; line-height: 1.3; }
.pdf-major-info strong { color: #fff; }
.pdf-certs { display: flex; flex-direction: column; gap: 3px; }
.pdf-cert { display: flex; align-items: center; gap: 6px; font-size: 0.6rem; color: #e8c547; padding: 3px 8px; border: 1px solid #4a3e10; font-family: 'Syne Mono', monospace; }
.pdf-cert img { width: 28px; height: 28px; object-fit: cover; }
.pdf-cert-emoji { font-size: 0.9rem; }
.pdf-socials { display: flex; gap: 10px; margin-top: auto; justify-content: center; padding-top: 10px; }
.pdf-socials a { color: #ddd; }
.pdf-socials svg { width: 22px; height: 22px; }
</style>

<script>
const DB = 'https://blzante-toolbox-default-rtdb.europe-west1.firebasedatabase.app';
const DEFAULT_BG = 'roster_bg.png';

const SOCIAL_ICONS = {
  instagram: `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>`,

  youtube: `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`,
};

(async () => {
  try {
    const res = await fetch(DB + '/roster.json');
    const data = await res.json();
    const content = document.getElementById('rosterContent');
    if (!data) { content.innerHTML = '<div class="loading">Aucun artiste.<br><a href="roster_create.html" style="color:var(--accent)">Créer une fiche →</a></div>'; return; }
    const artists = Object.values(data).sort((a, b) => (a.name || '').localeCompare(b.name || ''));

    let html = '<div class="roster-list">';
    artists.forEach(a => {
      const types = a.types ? (Array.isArray(a.types) ? a.types : [a.types]) : [];
      const skills = a.skills ? (Array.isArray(a.skills) ? a.skills : [a.skills]) : [];
      const allLabels = [...types, ...skills].join(' · ');
      const imgs = a.images ? (Array.isArray(a.images) ? a.images : Object.values(a.images)) : [];
      const primary = imgs.find(i => i.primary) || imgs[0];
      const bgImg = imgs.length > 1 ? (imgs.find(i => !i.primary) || imgs[0]) : primary;
      const bgSrc = a.bg || (bgImg ? bgImg.src : '') || DEFAULT_BG;
      const placements = a.placements ? (Array.isArray(a.placements) ? a.placements : Object.values(a.placements)) : [];
      const majors = a.majors ? (Array.isArray(a.majors) ? a.majors : Object.values(a.majors)) : [];
      const certs = a.certs ? (Array.isArray(a.certs) ? a.certs : Object.values(a.certs)) : [];
      const initial = (a.name || '?')[0];

      html += `<div class="roster-entry" data-id="${a.id}">`;
      html += `<div class="entry-header">`;
      html += `<span class="entry-chevron">›</span>`;
      html += `<div style="flex:1;min-width:0"><div class="entry-name">${a.name}</div>`;
      if (allLabels) html += `<div class="entry-types">${allLabels}</div>`;
      html += `</div>`;
      html += `<div class="entry-btns">`;
      html += `<button class="entry-btn pdf" data-id="${a.id}" title="Télécharger PDF">PDF</button>`;
      html += `<a class="entry-btn" href="roster_create.html?edit=${a.id}">edit</a>`;
      html += `</div></div>`;

      // Expandable card
      html += `<div class="entry-card"><div class="card-inner">`;
      if (bgSrc) html += `<div class="card-bg" style="background-image:url('${bgSrc}')"></div>`;
      html += `<div class="card-content">`;
      html += `<div class="card-top">`;
      if (primary) html += `<img class="card-photo" src="${primary.src}" />`;
      else html += `<div class="card-photo-ph">${initial}</div>`;
      html += `<div><div class="card-name">${a.name}</div>`;
      if (types.length) html += `<div class="card-types">${types.join(' · ')}</div>`;
      if (skills.length) html += `<div class="card-skills">${skills.join(' · ')}</div>`;
      html += `</div></div>`;

      // Playlist button
      if (a.youtube) {
        html += `<a class="playlist-btn" href="${a.youtube}" target="_blank">`;
        html += `<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
        html += `Écouter la playlist`;
        html += ` ${SOCIAL_ICONS.youtube}`;
        html += `</a>`;
      }

      if (a.bio) html += `<div class="card-bio">${a.bio}</div>`;

      // Placements
      if (placements.length) {
        const sorted = [...placements].map(p => typeof p === 'string' ? p : p.name || '').filter(Boolean).sort();
        html += `<div class="card-section-title">Artistes placés</div>`;
        html += `<div class="card-placements">`;
        sorted.forEach(n => { html += `<span class="pl-tag">${n}</span>`; });
        html += `</div>`;
      }

      // Major placements
      if (majors.length) {
        html += `<div class="card-section-title">Placements majeurs</div>`;
        html += `<div class="card-majors">`;
        majors.forEach(m => {
          html += `<div class="major-block">`;
          if (m.artwork) html += `<img class="major-art" src="${m.artwork}" />`;
          html += `<div class="major-info"><strong>${m.artist || ''}</strong><br>${m.title || ''}</div></div>`;
        });
        html += `</div>`;
      }

      // Certs
      if (certs.length) {
        const CERT_EMOJI = { 'Or': '🥇', 'Platine': '🥈', 'Diamant': '💎' };
        html += `<div class="card-section-title">Certifications</div>`;
        html += `<div class="card-certs">`;
        certs.forEach(c => {
          const emoji = CERT_EMOJI[c.level] || '';
          const label = [c.artist, c.project, c.type, c.level].filter(Boolean).join(' — ');
          html += `<span class="cert-tag">`;
          if (c.artwork) html += `<img class="cert-art" src="${c.artwork}" />`;
          else if (emoji) html += `<span style="font-size:1rem">${emoji}</span>`;
          html += label + `</span>`;
        });
        html += `</div>`;
      }

      // Social links
      const socials = ['instagram','tiktok','spotify','ytChannel'].filter(k => a[k]);
      if (socials.length) {
        html += `<div class="card-socials">`;
        socials.forEach(k => {
          const title = k === 'ytChannel' ? 'YouTube' : k === 'youtube' ? 'Playlist YT' : k.charAt(0).toUpperCase() + k.slice(1);
          html += `<a class="social-link" href="${a[k]}" target="_blank" title="${title}">${SOCIAL_ICONS[k] || title}</a>`;
        });
        html += `</div>`;
      }

      html += `</div></div></div></div>`;
    });
    html += '</div>';
    content.innerHTML = html;

    // Store artists for PDF
    window._rosterArtists = {};
    artists.forEach(a => { window._rosterArtists[a.id] = a; });

    // Toggle
    content.addEventListener('click', e => {
      const header = e.target.closest('.entry-header');
      if (header && !e.target.closest('.entry-btn')) {
        header.closest('.roster-entry').classList.toggle('open');
      }
    });

    // PDF download
    content.addEventListener('click', async e => {
      const pdfBtn = e.target.closest('.entry-btn.pdf');
      if (!pdfBtn) return;
      e.stopPropagation();
      const id = pdfBtn.dataset.id;
      const a = window._rosterArtists[id];
      if (!a) return;

      pdfBtn.textContent = '⏳';
      try { await generatePDF(a); } catch(err) { console.error(err); alert('Erreur PDF'); }
      pdfBtn.textContent = 'PDF';
    });

  } catch(err) { document.getElementById('rosterContent').innerHTML = '<div class="loading">⚠ Erreur de connexion</div>'; }
})();

async function generatePDF(a) {
  const render = document.getElementById('pdfRender');
  const types = a.types ? (Array.isArray(a.types) ? a.types : [a.types]) : [];
  const skills = a.skills ? (Array.isArray(a.skills) ? a.skills : [a.skills]) : [];
  const imgs = a.images ? (Array.isArray(a.images) ? a.images : Object.values(a.images)) : [];
  const primary = imgs.find(i => i.primary) || imgs[0];
  const bgSrc = a.bg || (imgs.length > 1 ? (imgs.find(i => !i.primary) || imgs[0] || {}).src : '') || DEFAULT_BG;
  const placements = a.placements ? (Array.isArray(a.placements) ? a.placements : Object.values(a.placements)) : [];
  const majors = a.majors ? (Array.isArray(a.majors) ? a.majors : Object.values(a.majors)) : [];
  const certs = a.certs ? (Array.isArray(a.certs) ? a.certs : Object.values(a.certs)) : [];
  const initial = (a.name || '?')[0];
  const CERT_EMOJI = { 'Or': '🥇', 'Platine': '🥈', 'Diamant': '💎' };
  const PLAY_SVG = '<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  const YT_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>';

  let h = '';
  if (bgSrc) h += `<div class="pdf-bg" style="background-image:url('${bgSrc}')"></div>`;
  h += '<div class="pdf-content">';

  // Top: photo + name (same as card)
  h += '<div class="pdf-top">';
  if (primary) h += `<img class="pdf-photo" src="${primary.src}" crossorigin="anonymous" />`;
  else h += `<div class="pdf-photo-ph">${initial}</div>`;
  h += '<div>';
  h += `<div class="pdf-name">${a.name}</div>`;
  if (types.length) h += `<div class="pdf-types">${types.join(' · ')}</div>`;
  if (skills.length) h += `<div class="pdf-skills">${skills.join(' · ')}</div>`;
  h += '</div></div>';

  // Playlist button
  if (a.youtube) {
    h += `<a class="pdf-playlist" href="${a.youtube}">${PLAY_SVG} Écouter la playlist ${YT_SVG}</a>`;
  }

  // Bio
  if (a.bio) h += `<div class="pdf-bio">${a.bio}</div>`;

  // Artistes placés (sorted)
  if (placements.length) {
    const sorted = [...placements].map(p => typeof p === 'string' ? p : p.name || '').filter(Boolean).sort();
    h += '<div class="pdf-section-label">ARTISTES PLACÉS</div>';
    h += '<div class="pdf-tags">';
    sorted.forEach(n => { h += `<span class="pdf-tag">${n}</span>`; });
    h += '</div>';
  }

  // Placements majeurs
  if (majors.length) {
    h += '<div class="pdf-section-label">PLACEMENTS MAJEURS</div>';
    h += '<div class="pdf-majors">';
    majors.forEach(m => {
      h += '<div class="pdf-major">';
      if (m.artwork) h += `<img src="${m.artwork}" crossorigin="anonymous" />`;
      h += `<div class="pdf-major-info"><strong>${m.artist || ''}</strong><br>${m.title || ''}</div></div>`;
    });
    h += '</div>';
  }

  // Certifications
  if (certs.length) {
    h += '<div class="pdf-section-label">CERTIFICATIONS</div>';
    h += '<div class="pdf-certs">';
    certs.forEach(c => {
      const emoji = CERT_EMOJI[c.level] || '';
      const label = [c.artist, c.project, c.type, c.level].filter(Boolean).join(' — ');
      h += '<span class="pdf-cert">';
      if (c.artwork) h += `<img src="${c.artwork}" crossorigin="anonymous" />`;
      else if (emoji) h += `<span class="pdf-cert-emoji">${emoji}</span>`;
      h += label + '</span>';
    });
    h += '</div>';
  }

  // Social icons
  const socials = ['instagram','tiktok','spotify','ytChannel'].filter(k => a[k]);
  if (socials.length) {
    h += '<div class="pdf-socials">';
    socials.forEach(k => { h += `<a href="${a[k]}">${SOCIAL_ICONS[k]}</a>`; });
    h += '</div>';
  }

  h += '</div>';
  render.innerHTML = h;

  // Wait for images to load
  const allImgs = render.querySelectorAll('img');
  await Promise.all(Array.from(allImgs).map(img => {
    if (img.complete) return Promise.resolve();
    return new Promise(res => { img.onload = res; img.onerror = res; });
  }));

  // Small delay for rendering
  await new Promise(r => setTimeout(r, 200));

  // Render to canvas
  const canvas = await html2canvas(render, {
    width: 800, height: 800, scale: 2,
    backgroundColor: '#0a0a0a', useCORS: true, allowTaint: true,
  });

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [210, 210] });
  const imgData = canvas.toDataURL('image/jpeg', 0.92);
  pdf.addImage(imgData, 'JPEG', 0, 0, 210, 210);
  const now = new Date();
  const yyyymmdd = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
  pdf.save(yyyymmdd + '_' + (a.name || 'artiste').replace(/[^a-zA-Z0-9]/g, '_') + '_fiche.pdf');

  render.innerHTML = '';
}
</script>
