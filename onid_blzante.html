<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONID BLZante — BLZante Toolbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0d0d0d; --border:#2a2a2a; --text:#f0ede6; --muted:#555; --accent:#e8c547; --s:#111; --s2:#161616; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
    body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:60px 60px; opacity:.3; pointer-events:none; z-index:0; }
    nav { position:relative; z-index:1; display:flex; align-items:center; gap:12px; padding:18px 40px; border-bottom:1px solid var(--border); font-family:'Syne Mono',monospace; font-size:.65rem; letter-spacing:.1em; }
    nav a { color:var(--muted); text-decoration:none; transition:color .15s; }
    nav a:hover { color:var(--accent); }
    .sep { color:var(--border); }
    .cur { color:var(--text); font-weight:600; }
    #root { position:relative; z-index:1; flex:1; padding:28px 40px 48px; }
    @media(max-width:700px){ nav,#root{padding-left:20px;padding-right:20px;} }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">← BLZante Toolbox</a>
    <span class="sep">/</span>
    <span class="cur">ONID BLZante</span>
  </nav>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useCallback, useRef, useEffect } = React;
    const XL = XLSX;

    // ─── Utils ────────────────────────────────────────────────────────────────

    function norm(str) {
      if (str == null) return "";
      return str.toString().toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
        .replace(/[^a-z0-9\s]/g," ").replace(/\s+/g," ").trim();
    }

    function tokenize(s) { return norm(s).split(" ").filter(Boolean); }

    function jaccardSim(a, b) {
      const sa = new Set(tokenize(a)), sb = new Set(tokenize(b));
      if (!sa.size && !sb.size) return 1;
      const inter = [...sa].filter(x => sb.has(x)).length;
      return inter / (sa.size + sb.size - inter);
    }

    function levenshtein(a, b) {
      const na = norm(a), nb = norm(b);
      const m = na.length, n = nb.length;
      if (!m) return n; if (!n) return m;
      const p = [...Array(n+1).keys()], c = new Array(n+1);
      for (let i=1;i<=m;i++){c[0]=i;for(let j=1;j<=n;j++)c[j]=na[i-1]===nb[j-1]?p[j-1]:1+Math.min(p[j],c[j-1],p[j-1]);p.splice(0,n+1,...c);}
      return p[n];
    }

    function fuzzyScore(q, c) {
      const jac = jaccardSim(q, c);
      const ml = Math.max(norm(q).length, norm(c).length);
      const lev = ml ? 1 - levenshtein(q,c)/ml : 1;
      return 0.65*jac + 0.35*lev;
    }

    function bestCatMatches(titre, activeCats, topN=3) {
      const all = [];
      for (const {name, rows, col} of activeCats) {
        rows.forEach(row => {
          const t = (row[col]||"").toString();
          if (!t) return;
          const s = fuzzyScore(titre, t);
          if (s > 0.12) all.push({titre:t, score:s, catalogue:name});
        });
      }
      return all.sort((a,b)=>b.score-a.score).slice(0,topN);
    }

    function readExcel(file) {
      return new Promise((res,rej) => {
        const r = new FileReader();
        r.onload = e => { try { const wb=XL.read(new Uint8Array(e.target.result),{type:"array"}); res(XL.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""})); } catch(err){rej(err);} };
        r.onerror = rej;
        r.readAsArrayBuffer(file);
      });
    }

    function autoCol(rows, ...hints) {
      if (!rows.length) return "";
      const keys = Object.keys(rows[0]);
      for (const h of hints) { const f=keys.find(k=>norm(k)===norm(h)); if(f) return f; }
      for (const h of hints) { const f=keys.find(k=>norm(k).includes(norm(h))); if(f) return f; }
      return keys[0];
    }

    // ─── Recherche asynchrone par chunks ─────────────────────────────────────
    // Cède la main au navigateur toutes les CHUNK_SIZE lignes pour éviter le freeze

    const CHUNK_SIZE = 5000; // lignes traitées par tick

    function searchAsync(onidData, normOnidTitre, normOnidAyant, terms, colTitre, colAyant, activeCats, onProgress, onDone) {
      const normTerms = terms.map(t => ({raw: t, n: norm(t)}));
      const seen = new Set();
      const matches = [];
      let termIdx = 0;
      let rowIdx = 0;

      function tick() {
        const deadline = Date.now() + 16; // ~1 frame

        while (Date.now() < deadline) {
          if (termIdx >= normTerms.length) {
            onDone(matches);
            return;
          }

          const {raw: terme, n: nt} = normTerms[termIdx];
          const end = Math.min(rowIdx + CHUNK_SIZE, onidData.length);

          for (let i = rowIdx; i < end; i++) {
            if (!seen.has(i)) {
              const matchT = normOnidTitre[i].includes(nt);
              const matchA = normOnidAyant[i].includes(nt);
              if (matchT || matchA) {
                seen.add(i);
                const titre = (onidData[i][colTitre]||"").toString();
                matches.push({
                  id: String(i),
                  terme,
                  matchIn: matchT && matchA ? "titre + ayant droit" : matchT ? "titre" : "ayant droit",
                  row: onidData[i],
                  catMatches: activeCats.length > 0 ? bestCatMatches(titre, activeCats) : [],
                });
              }
            }
          }

          rowIdx = end;

          if (rowIdx >= onidData.length) {
            termIdx++;
            rowIdx = 0;
            const pct = Math.round((termIdx / normTerms.length) * 100);
            onProgress(pct, termIdx, normTerms.length, matches.length);
          }
        }

        setTimeout(tick, 0);
      }

      setTimeout(tick, 0);
    }

    // ─── Persistance ─────────────────────────────────────────────────────────

    const SK = "onid_blzante_termes";
    const loadTerms = () => { try{const v=localStorage.getItem(SK);return v?JSON.parse(v):[];}catch{return[];} };
    const saveTerms = t => { try{localStorage.setItem(SK,JSON.stringify(t));}catch{} };

    // ─── Design ───────────────────────────────────────────────────────────────

    const C = {
      bg:"#0d0d0d", s:"#111", s2:"#161616", s3:"#1a1a1a",
      b:"#2a2a2a", b2:"#333", text:"#f0ede6", muted:"#555", m2:"#888",
      accent:"#e8c547",
      green:"#4ade80", gBg:"#0a1a0a", gBorder:"#1a4a1a",
      red:"#f87171",   rBg:"#1a0a0a", rBorder:"#4a1a1a",
      violet:"#a78bfa", blue:"#60a5fa",
    };
    const mono = "'Syne Mono',monospace";
    const syne = "'Syne',sans-serif";

    const btn = (active, accent) => {
      const a = accent || C.accent;
      return { background:active?a:C.s2, color:active?C.bg:C.muted, border:`1px solid ${active?a:C.b2}`, borderRadius:2, padding:"8px 18px", fontFamily:mono, fontSize:10, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", cursor:"pointer", transition:"all .15s" };
    };
    const ghostBtn = { background:"none", border:`1px solid ${C.b2}`, borderRadius:2, padding:"8px 18px", fontFamily:mono, fontSize:10, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:C.muted, cursor:"pointer", transition:"all .15s" };
    const card = { background:C.s, border:`1px solid ${C.b}`, borderRadius:3, padding:24 };
    const sel = { width:"100%", padding:"8px 10px", borderRadius:2, border:`1px solid ${C.b2}`, fontSize:12, background:C.s2, color:C.text, fontFamily:mono, cursor:"pointer" };
    const inp = { padding:"9px 13px", borderRadius:2, border:`1px solid ${C.b2}`, fontSize:13, background:C.s2, color:C.text, outline:"none", width:"100%", boxSizing:"border-box", fontFamily:"'Inter',sans-serif" };
    const slbl = { fontFamily:mono, fontSize:9, fontWeight:700, color:C.muted, letterSpacing:"0.22em", textTransform:"uppercase", display:"block", marginBottom:8 };

    const CATS = [
      {key:"blzante",    name:"BLZante",    color:C.accent},
      {key:"rossinante", name:"Rossinante", color:C.violet},
      {key:"blz",        name:"BLZ",        color:C.blue},
    ];

    const PAGE_SIZE = 50;

    // ─── App ──────────────────────────────────────────────────────────────────

    function App() {
      const [step, setStep] = useState(1);
      const [tab, setTab]   = useState("upload");

      // ONID
      const [onidData, setOnidData]       = useState([]);
      const [onidFile, setOnidFile]       = useState("");
      const [normTitre, setNormTitre]     = useState([]); // pré-normalisé
      const [normAyant, setNormAyant]     = useState([]); // pré-normalisé
      const [colTitre, setColTitre]       = useState("");
      const [colAyant, setColAyant]       = useState("");

      // Catalogues
      const [cats, setCats]         = useState({blzante:[],rossinante:[],blz:[]});
      const [catFiles, setCatFiles] = useState({blzante:"",rossinante:"",blz:""});
      const [catCols, setCatCols]   = useState({blzante:"",rossinante:"",blz:""});

      // Termes
      const [terms, setTerms] = useState(()=>loadTerms());
      const [newTerm, setNewTerm] = useState("");

      // Recherche
      const [searching, setSearching]   = useState(false);
      const [progress, setProgress]     = useState(0); // 0-100
      const [progressMsg, setProgressMsg] = useState("");

      // Résultats
      const [results, setResults]   = useState([]);
      const [decisions, setDec]     = useState({});
      const [selCat, setSelCat]     = useState({});
      const [filter, setFilter]     = useState("all");
      const [page, setPage]         = useState(0);

      const [err, setErr] = useState("");
      const [msg, setMsg] = useState("");

      const onidCols   = onidData.length ? Object.keys(onidData[0]) : [];
      const anyCat     = CATS.some(c => cats[c.key].length > 0);
      const montantKey = onidCols.find(k => /montant|amount|somme/i.test(k));

      const persistTerms = useCallback(t => { setTerms(t); saveTerms(t); }, []);

      // ── Termes ────────────────────────────────────────────────────────────

      function addTerm() {
        const t = newTerm.trim();
        if (!t) return;
        if (terms.some(x => norm(x)===norm(t))) { setErr("Terme déjà présent."); return; }
        persistTerms([...terms, t]);
        setNewTerm(""); setErr(""); setMsg("");
      }
      function removeTerm(i) { persistTerms(terms.filter((_,j)=>j!==i)); }
      async function importFile(file) {
        try {
          const rows = await readExcel(file);
          if (!rows.length) { setErr("Fichier vide."); return; }
          const col = Object.keys(rows[0])[0];
          const incoming = rows.map(r=>(r[col]||"").toString().trim()).filter(Boolean);
          const merged = [...terms]; let added=0;
          incoming.forEach(t=>{ if(!merged.some(x=>norm(x)===norm(t))){ merged.push(t); added++; } });
          persistTerms(merged);
          setErr(""); setMsg(`✓ ${added} terme(s) importé(s), ${incoming.length-added} doublon(s) ignoré(s).`);
        } catch(e) { setErr("Erreur import : "+e.message); }
      }

      // ── Fichiers ──────────────────────────────────────────────────────────

      async function loadOnid(file) {
        try {
          setMsg("⏳ Chargement en cours…"); setErr("");
          const rows = await readExcel(file);
          if (!rows.length) { setErr("Fichier ONID vide."); setMsg(""); return; }
          const ct = autoCol(rows,"TITROEUV","titre","oeuvre","libelle","title");
          const ca = autoCol(rows,"AD","ayant","artiste","editeur","compositeur","author");
          // Pré-normalisation immédiate — fait une seule fois
          setMsg("⏳ Pré-traitement des données…");
          await new Promise(r=>setTimeout(r,0));
          const nt = rows.map(r=>norm((r[ct]||"").toString()));
          const na = rows.map(r=>norm((r[ca]||"").toString()));
          setOnidData(rows); setOnidFile(file.name);
          setColTitre(ct); setColAyant(ca);
          setNormTitre(nt); setNormAyant(na);
          setErr(""); setMsg(`✓ ${rows.length.toLocaleString("fr-FR")} lignes chargées. Colonnes détectées : ${ct} (titre) + ${ca} (ayant droit).`);
        } catch(e) { setErr("Erreur ONID : "+e.message); setMsg(""); }
      }

      async function loadCat(key, file) {
        try {
          const rows = await readExcel(file);
          if (!rows.length) { setErr(`Catalogue ${key} vide.`); return; }
          const col = autoCol(rows,"Titre de l'oeuvre","titre","oeuvre","libelle","title");
          setCats(c=>({...c,[key]:rows}));
          setCatFiles(f=>({...f,[key]:file.name}));
          setCatCols(c=>({...c,[key]:col}));
          setErr(""); setMsg("");
        } catch(e) { setErr("Erreur catalogue : "+e.message); }
      }

      // Recalcul des normalisés si colTitre/colAyant changent manuellement
      function reNormalize(ct, ca) {
        if (!onidData.length) return;
        const nt = onidData.map(r=>norm((r[ct]||"").toString()));
        const na = onidData.map(r=>norm((r[ca]||"").toString()));
        setNormTitre(nt); setNormAyant(na);
      }

      // ── Recherche ─────────────────────────────────────────────────────────

      function runSearch() {
        setSearching(true); setProgress(0); setProgressMsg(`Initialisation…`); setErr("");
        const activeCats = CATS.filter(c=>cats[c.key].length>0).map(c=>({name:c.name,rows:cats[c.key],col:catCols[c.key]}));
        searchAsync(
          onidData, normTitre, normAyant, terms, colTitre, colAyant, activeCats,
          (pct, ti, total, found) => {
            setProgress(pct);
            setProgressMsg(`Terme ${ti}/${total} traité — ${found.toLocaleString("fr-FR")} correspondances trouvées`);
          },
          (matches) => {
            setResults(matches);
            setDec({}); setSelCat({}); setPage(0); setFilter("all");
            setSearching(false); setStep(3);
          }
        );
      }

      // ── Résultats ─────────────────────────────────────────────────────────

      const decide  = useCallback((id,d)=>setDec(p=>({...p,[id]:p[id]===d?undefined:d})),[]);
      const pickCat = useCallback((id,v)=>setSelCat(p=>({...p,[id]:v})),[]);

      const stats = useMemo(()=>({
        total:   results.length,
        v:       results.filter(r=>decisions[r.id]==="v").length,
        j:       results.filter(r=>decisions[r.id]==="j").length,
        pending: results.filter(r=>!decisions[r.id]).length,
      }),[results,decisions]);

      const filtered = useMemo(()=>{
        if (filter==="pending") return results.filter(r=>!decisions[r.id]);
        if (filter==="v")       return results.filter(r=>decisions[r.id]==="v");
        if (filter==="j")       return results.filter(r=>decisions[r.id]==="j");
        return results;
      },[results,decisions,filter]);

      const pageCount = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      const safePage  = Math.min(page, pageCount - 1);
      const visible   = filtered.slice(safePage * PAGE_SIZE, (safePage+1) * PAGE_SIZE);

      function changeFilter(f) { setFilter(f); setPage(0); }

      function exportXlsx() {
        const rows = results.filter(r=>decisions[r.id]==="v").map(r=>({...r.row,"Terme trouvé":r.terme,"Oeuvre identifiée":selCat[r.id]||""}));
        const ws = XL.utils.json_to_sheet(rows);
        const wb = XL.utils.book_new();
        XL.utils.book_append_sheet(wb,ws,"Validées");
        XL.writeFile(wb,"ONID_validees.xlsx");
      }

      function reset() {
        setStep(1); setResults([]); setDec({}); setSelCat({});
        setOnidData([]); setOnidFile(""); setNormTitre([]); setNormAyant([]);
        setCats({blzante:[],rossinante:[],blz:[]}); setCatFiles({blzante:"",rossinante:"",blz:""});
        setFilter("all"); setPage(0); setErr(""); setMsg(""); setTab("upload");
        setSearching(false); setProgress(0);
      }

      // ── Tab helpers ───────────────────────────────────────────────────────

      const TabBtn = ({k,lbl}) => (
        <button onClick={()=>{setTab(k);setErr("");setMsg("");}} style={{background:"none",border:"none",borderBottom:tab===k?`2px solid ${C.accent}`:"2px solid transparent",padding:"8px 20px",marginBottom:-1,fontFamily:mono,fontSize:10,letterSpacing:"0.14em",textTransform:"uppercase",color:tab===k?C.accent:C.muted,cursor:"pointer",transition:"all .15s"}}>{lbl}</button>
      );

      // ─────────────────────────────────────────────────────────────────────
      // RENDER
      // ─────────────────────────────────────────────────────────────────────

      return (
        <div style={{maxWidth:1300,margin:"0 auto"}}>

          {/* Titre */}
          <div style={{marginBottom:22}}>
            <div style={{fontFamily:mono,fontSize:9,color:C.muted,letterSpacing:"0.24em",textTransform:"uppercase",marginBottom:6}}>Outils / SACEM</div>
            <h1 style={{fontFamily:syne,fontSize:20,fontWeight:800,color:C.text,letterSpacing:"-0.01em"}}>ONID BLZante</h1>
            <div style={{fontFamily:mono,fontSize:10,color:C.muted,marginTop:4,letterSpacing:"0.06em"}}>Identification des Oeuvres Non Identifiées SACEM</div>
          </div>

          {/* Stepper */}
          <div style={{display:"flex",gap:0,marginBottom:24,borderBottom:`1px solid ${C.b}`}}>
            {["1 — Fichiers & Termes","2 — Recherche","3 — Résultats"].map((lbl,i)=>(
              <div key={i} style={{padding:"10px 24px",fontFamily:mono,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:step===i+1?C.accent:step>i+1?C.m2:C.muted,borderBottom:step===i+1?`2px solid ${C.accent}`:"2px solid transparent",marginBottom:-1}}>
                {step>i+1?"✓ ":""}{lbl}
              </div>
            ))}
          </div>

          {/* Notifs */}
          {err && <div style={{background:C.rBg,border:`1px solid ${C.rBorder}`,borderRadius:2,padding:"9px 16px",marginBottom:14,color:C.red,fontSize:12,fontFamily:mono,letterSpacing:"0.04em"}}>⚠ {err}</div>}
          {msg && !err && <div style={{background:C.gBg,border:`1px solid ${C.gBorder}`,borderRadius:2,padding:"9px 16px",marginBottom:14,color:C.green,fontSize:12,fontFamily:mono,letterSpacing:"0.04em"}}>{msg}</div>}

          {/* ══ ÉTAPE 1 ══ */}
          {step===1 && (
            <>
              <div style={{display:"flex",gap:1,marginBottom:18,borderBottom:`1px solid ${C.b}`}}>
                <TabBtn k="upload" lbl="Fichiers" />
                <TabBtn k="termes" lbl={`Termes (${terms.length})`} />
              </div>

              {/* Fichiers */}
              {tab==="upload" && (
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {/* ONID */}
                  <div style={{...card,borderColor:onidData.length?C.accent+"66":C.b}}>
                    <div style={{display:"flex",alignItems:"center",gap:16}}>
                      <div style={{flex:1}}>
                        <span style={slbl}>Fichier ONID <span style={{color:C.red}}>*requis</span></span>
                        <div style={{fontFamily:syne,fontWeight:700,fontSize:14,color:C.text}}>Export SACEM — Oeuvres Non Identifiées</div>
                        {onidData.length>0 && (
                          <div style={{fontFamily:mono,fontSize:10,color:C.muted,marginTop:6,letterSpacing:"0.04em"}}>
                            {onidFile} &nbsp;·&nbsp; <span style={{color:C.text}}>{onidData.length.toLocaleString("fr-FR")}</span> lignes &nbsp;·&nbsp;
                            colonnes : <span style={{color:C.accent}}>{colTitre}</span> + <span style={{color:C.accent}}>{colAyant}</span>
                          </div>
                        )}
                      </div>
                      {onidData.length>0
                        ? <label style={{...ghostBtn,cursor:"pointer"}}>Changer <input type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>e.target.files[0]&&loadOnid(e.target.files[0])} /></label>
                        : <label style={{...btn(true),cursor:"pointer"}}>Charger <input type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>e.target.files[0]&&loadOnid(e.target.files[0])} /></label>
                      }
                    </div>
                  </div>

                  {/* Catalogues */}
                  <div style={card}>
                    <span style={slbl}>Catalogues <span style={{fontWeight:400,color:C.muted}}>(optionnel — pour le matching)</span></span>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:C.b,border:`1px solid ${C.b}`}}>
                      {CATS.map(({key,name,color})=>{
                        const loaded=cats[key].length>0;
                        return (
                          <div key={key} style={{background:C.s2,padding:14,borderTop:`2px solid ${loaded?color:"transparent"}`}}>
                            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
                              <div style={{width:7,height:7,borderRadius:"50%",background:color,opacity:loaded?1:.25}}/>
                              <span style={{fontFamily:syne,fontWeight:700,fontSize:13,color:loaded?C.text:C.muted}}>{name}</span>
                            </div>
                            {loaded ? (
                              <>
                                <div style={{fontFamily:mono,fontSize:9,color:C.muted,marginBottom:8,wordBreak:"break-all"}}>{catFiles[key]}</div>
                                <div style={{fontFamily:mono,fontSize:10,color,letterSpacing:"0.06em",marginBottom:10}}>{cats[key].length} oeuvres</div>
                                <div style={{fontFamily:mono,fontSize:9,color:C.muted,marginBottom:10}}>Colonne : <span style={{color:C.text}}>{catCols[key]}</span></div>
                                <label style={{...ghostBtn,fontSize:9,cursor:"pointer"}}>Changer <input type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>e.target.files[0]&&loadCat(key,e.target.files[0])} /></label>
                              </>
                            ) : (
                              <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,cursor:"pointer",padding:"18px 0"}}>
                                <span style={{fontSize:20,opacity:.3}}>📚</span>
                                <span style={{fontFamily:mono,fontSize:9,color:C.muted,letterSpacing:"0.1em"}}>Cliquer pour charger</span>
                                <input type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>e.target.files[0]&&loadCat(key,e.target.files[0])} />
                              </label>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  <div style={{display:"flex",justifyContent:"flex-end",gap:8,paddingTop:4}}>
                    <button onClick={()=>{setTab("termes");setErr("");setMsg("");}} style={ghostBtn}>Gérer les termes ({terms.length}) →</button>
                    <button onClick={()=>{
                      if(!onidData.length){setErr("Chargez le fichier ONID.");return;}
                      if(!terms.length){setErr("Ajoutez au moins un terme.");return;}
                      setStep(2);setErr("");setMsg("");
                    }} style={{...btn(true),opacity:(!onidData.length||!terms.length)?.35:1}}>Configurer la recherche →</button>
                  </div>
                </div>
              )}

              {/* Termes */}
              {tab==="termes" && (
                <div style={card}>
                  <span style={slbl}>Bibliothèque de termes</span>
                  <div style={{fontFamily:mono,fontSize:10,color:C.muted,marginBottom:18,letterSpacing:"0.04em",lineHeight:1.8}}>
                    Chaque terme est cherché dans les colonnes titre et ayant droit du fichier ONID.<br/>
                    Sauvegardés dans le navigateur — réutilisables à chaque session.
                  </div>
                  <div style={{display:"flex",gap:8,marginBottom:18}}>
                    <input style={{...inp,flex:1}} placeholder="Ex : DAFT PUNK, MAES, IAM…" value={newTerm} onChange={e=>setNewTerm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTerm()} />
                    <button onClick={addTerm} style={btn(true)}>+ Ajouter</button>
                    <label style={{...ghostBtn,cursor:"pointer"}}>↑ Importer <input type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>e.target.files[0]&&importFile(e.target.files[0])} /></label>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <span style={{fontFamily:mono,fontSize:9,color:C.muted,letterSpacing:"0.18em"}}>{terms.length} TERME{terms.length!==1?"S":""} ENREGISTRÉ{terms.length!==1?"S":""}</span>
                    {terms.length>0&&<button onClick={()=>{if(window.confirm("Vider toute la bibliothèque ?"))persistTerms([]);}} style={{background:"none",border:"none",color:C.red,fontSize:10,cursor:"pointer",fontFamily:mono,letterSpacing:"0.1em"}}>✕ Tout effacer</button>}
                  </div>
                  {terms.length===0
                    ? <div style={{textAlign:"center",padding:"36px 0",color:C.muted,fontFamily:mono,fontSize:10,lineHeight:2.2,letterSpacing:"0.1em"}}>AUCUN TERME ENREGISTRÉ</div>
                    : <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {terms.map((t,i)=>(
                          <div key={i} style={{background:C.s2,border:`1px solid ${C.b2}`,borderRadius:2,padding:"5px 8px 5px 12px",display:"flex",alignItems:"center",gap:8,fontFamily:mono,fontSize:11,color:C.text,letterSpacing:"0.04em"}}>
                            {t}
                            <button onClick={()=>removeTerm(i)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:0,lineHeight:1}}>×</button>
                          </div>
                        ))}
                      </div>
                  }
                  <div style={{marginTop:20,display:"flex",justifyContent:"flex-end"}}>
                    <button onClick={()=>{setTab("upload");setErr("");setMsg("");}} style={btn(true)}>← Retour aux fichiers</button>
                  </div>
                </div>
              )}
            </>
          )}

          {/* ══ ÉTAPE 2 ══ */}
          {step===2 && (
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {/* Colonnes ONID */}
              <div style={card}>
                <span style={slbl}>Colonnes du fichier ONID</span>
                <div style={{fontFamily:mono,fontSize:10,color:C.muted,marginBottom:20,letterSpacing:"0.04em",lineHeight:1.8}}>
                  Les termes seront recherchés dans ces deux colonnes. Vérifie que les bonnes colonnes sont sélectionnées, puis lance la recherche.
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                  {[
                    {label:"Titre de l'oeuvre", hint:"SACEM : TITROEUV", val:colTitre, set:v=>{setColTitre(v);reNormalize(v,colAyant);}},
                    {label:"Ayant droit",        hint:"SACEM : AD",       val:colAyant, set:v=>{setColAyant(v);reNormalize(colTitre,v);}},
                  ].map(({label,hint,val,set})=>(
                    <div key={label} style={{background:C.s2,border:`1px solid ${C.b}`,borderRadius:2,padding:16}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                        <div style={{width:7,height:7,borderRadius:"50%",background:C.accent}}/>
                        <span style={{fontFamily:syne,fontWeight:700,fontSize:13,color:C.text}}>{label}</span>
                        <span style={{fontFamily:mono,fontSize:9,color:C.muted,marginLeft:"auto",letterSpacing:"0.08em"}}>{hint}</span>
                      </div>
                      <select value={val} onChange={e=>set(e.target.value)} style={sel}>
                        {onidCols.map(o=><option key={o} value={o}>{o}</option>)}
                      </select>
                      <div style={{fontFamily:mono,fontSize:9,color:C.muted,marginTop:8,letterSpacing:"0.04em"}}>
                        Exemple : « {(onidData[0]&&onidData[0][val])||"—"} »
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Catalogues */}
              {anyCat && (
                <div style={card}>
                  <span style={slbl}>Colonnes titre dans les catalogues</span>
                  <div style={{fontFamily:mono,fontSize:10,color:C.muted,marginBottom:16,letterSpacing:"0.04em",lineHeight:1.8}}>
                    Le titre ONID sera comparé à ces colonnes pour proposer une oeuvre correspondante dans le catalogue.
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                    {CATS.filter(c=>cats[c.key].length>0).map(({key,name,color})=>{
                      const opts=Object.keys((cats[key][0])||{});
                      return (
                        <div key={key} style={{background:C.s2,border:`1px solid ${C.b}`,borderRadius:2,padding:14,borderTop:`2px solid ${color}`}}>
                          <div style={{fontFamily:syne,fontWeight:700,fontSize:12,color,marginBottom:10}}>{name}</div>
                          <select value={catCols[key]} onChange={e=>setCatCols(c=>({...c,[key]:e.target.value}))} style={sel}>
                            {opts.map(o=><option key={o} value={o}>{o}</option>)}
                          </select>
                          <div style={{fontFamily:mono,fontSize:9,color:C.muted,marginTop:8,letterSpacing:"0.04em"}}>
                            Exemple : « {(cats[key][0]&&cats[key][0][catCols[key]])||"—"} »
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Récap */}
              <div style={{background:C.s2,border:`1px solid ${C.b}`,borderRadius:2,padding:"14px 20px"}}>
                <div style={{fontFamily:mono,fontSize:10,color:C.muted,letterSpacing:"0.06em",lineHeight:2.2}}>
                  <span style={{color:C.text}}>{terms.length}</span> terme{terms.length!==1?"s":""} à chercher &nbsp;·&nbsp;
                  dans <span style={{color:C.text}}>{onidData.length.toLocaleString("fr-FR")}</span> lignes &nbsp;·&nbsp;
                  colonnes : <span style={{color:C.accent}}>{colTitre}</span> + <span style={{color:C.accent}}>{colAyant}</span>
                  {anyCat&&<> &nbsp;·&nbsp; matching : {CATS.filter(c=>cats[c.key].length>0).map(c=><span key={c.key} style={{color:c.color}}>{c.name} </span>)}</>}
                </div>
              </div>

              {/* Barre de progression */}
              {searching && (
                <div style={{background:C.s2,border:`1px solid ${C.b}`,borderRadius:2,padding:16}}>
                  <div style={{fontFamily:mono,fontSize:10,color:C.muted,marginBottom:10,letterSpacing:"0.06em"}}>{progressMsg}</div>
                  <div style={{height:4,background:C.b,borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",background:C.accent,width:`${progress}%`,transition:"width .2s",borderRadius:2}}/>
                  </div>
                </div>
              )}

              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setStep(1);setErr("");setMsg("");}} style={ghostBtn} disabled={searching}>← Retour</button>
                <button onClick={runSearch} disabled={searching} style={{...btn(true),opacity:searching?.5:1}}>
                  {searching?"⏳ Recherche en cours…":"Lancer la recherche →"}
                </button>
              </div>
            </div>
          )}

          {/* ══ ÉTAPE 3 ══ */}
          {step===3 && (
            <>
              {/* Stats */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr auto",gap:1,background:C.b,border:`1px solid ${C.b}`,marginBottom:14}}>
                {[
                  {lbl:"Trouvées",   val:stats.total,   color:C.text,    f:"all"},
                  {lbl:"En attente", val:stats.pending, color:"#f59e0b", f:"pending"},
                  {lbl:"Validées",   val:stats.v,       color:C.green,   f:"v"},
                  {lbl:"Rejetées",   val:stats.j,       color:C.red,     f:"j"},
                ].map(({lbl,val,color,f})=>(
                  <div key={f} onClick={()=>changeFilter(f)} style={{background:filter===f?C.s:C.s2,padding:"14px 18px",cursor:"pointer",borderTop:`2px solid ${filter===f?color:"transparent"}`,transition:"all .15s",userSelect:"none"}}>
                    <div style={{fontFamily:syne,fontSize:24,fontWeight:800,color}}>{val.toLocaleString("fr-FR")}</div>
                    <div style={{fontFamily:mono,fontSize:9,color:C.muted,marginTop:3,letterSpacing:"0.14em",textTransform:"uppercase"}}>{lbl}</div>
                  </div>
                ))}
                <button onClick={exportXlsx} disabled={stats.v===0} style={{background:stats.v?C.accent:C.s2,color:stats.v?C.bg:C.muted,border:"none",cursor:stats.v?"pointer":"default",padding:"14px 20px",fontFamily:mono,fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",lineHeight:1.8,transition:"all .15s"}}>
                  ↓ Export<br/>Excel
                </button>
              </div>

              {/* Pagination info + contrôles */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
                <div style={{fontFamily:mono,fontSize:9,color:C.muted,letterSpacing:"0.1em"}}>
                  {filtered.length.toLocaleString("fr-FR")} résultat{filtered.length!==1?"s":""} &nbsp;·&nbsp;
                  page {safePage+1} / {pageCount}
                  {anyCat&&<> &nbsp;·&nbsp; {CATS.filter(c=>cats[c.key].length>0).map(c=><span key={c.key} style={{color:c.color}}>{c.name} </span>)}</>}
                </div>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>setPage(0)} disabled={safePage===0} style={{...ghostBtn,padding:"5px 10px",fontSize:9,opacity:safePage===0?.3:1}}>«</button>
                  <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={safePage===0} style={{...ghostBtn,padding:"5px 10px",fontSize:9,opacity:safePage===0?.3:1}}>‹</button>
                  <button onClick={()=>setPage(p=>Math.min(pageCount-1,p+1))} disabled={safePage>=pageCount-1} style={{...ghostBtn,padding:"5px 10px",fontSize:9,opacity:safePage>=pageCount-1?.3:1}}>›</button>
                  <button onClick={()=>setPage(pageCount-1)} disabled={safePage>=pageCount-1} style={{...ghostBtn,padding:"5px 10px",fontSize:9,opacity:safePage>=pageCount-1?.3:1}}>»</button>
                </div>
              </div>

              {/* Table */}
              <div style={{border:`1px solid ${C.b}`,overflow:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr>
                      {["Terme","Trouvé dans","Titre ONID","Ayant droit",
                        montantKey&&"Montant",
                        anyCat&&"Oeuvre catalogue (fuzzy match)",
                        "Décision"].filter(Boolean).map(h=>(
                        <th key={h} style={{padding:"9px 14px",textAlign:"left",fontFamily:mono,fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"0.16em",textTransform:"uppercase",background:C.s2,borderBottom:`1px solid ${C.b}`,whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {visible.length===0 && (
                      <tr><td colSpan={8} style={{padding:48,textAlign:"center",fontFamily:mono,fontSize:10,color:C.muted,letterSpacing:"0.1em"}}>
                        {results.length===0?"AUCUNE OEUVRE TROUVÉE AVEC CES TERMES":"AUCUN RÉSULTAT DANS CE FILTRE"}
                      </td></tr>
                    )}
                    {visible.map((r,idx)=>{
                      const dec=decisions[r.id];
                      const rowBg=dec==="v"?C.gBg:dec==="j"?C.rBg:idx%2?C.s:C.s2;
                      return (
                        <tr key={r.id} style={{background:rowBg,borderBottom:`1px solid ${C.b}`,transition:"background .15s"}}>
                          <td style={{padding:"9px 14px",whiteSpace:"nowrap"}}>
                            <span style={{fontFamily:mono,fontSize:10,color:C.accent,background:C.accent+"15",border:`1px solid ${C.accent}33`,borderRadius:2,padding:"2px 7px",letterSpacing:"0.06em"}}>{r.terme}</span>
                          </td>
                          <td style={{padding:"9px 14px",whiteSpace:"nowrap"}}>
                            <span style={{fontFamily:mono,fontSize:9,color:C.muted,letterSpacing:"0.06em"}}>{r.matchIn}</span>
                          </td>
                          <td style={{padding:"9px 14px",fontWeight:600,maxWidth:220,color:C.text}}>
                            <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.row[colTitre]||"—"}</div>
                          </td>
                          <td style={{padding:"9px 14px",color:C.m2,maxWidth:160}}>
                            <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.row[colAyant]||"—"}</div>
                          </td>
                          {montantKey&&<td style={{padding:"9px 14px",color:C.text,whiteSpace:"nowrap",fontFamily:mono,fontSize:11}}>{r.row[montantKey]||"—"}</td>}
                          {anyCat&&(
                            <td style={{padding:"9px 14px",minWidth:280}}>
                              {r.catMatches.length===0
                                ? <span style={{fontFamily:mono,fontSize:9,color:C.muted}}>—</span>
                                : <select value={selCat[r.id]||""} onChange={e=>pickCat(r.id,e.target.value)} style={{...sel,fontSize:11}}>
                                    <option value="">— Sélectionner —</option>
                                    {r.catMatches.map((m,i)=>(
                                      <option key={i} value={`[${m.catalogue}] ${m.titre}`}>[{m.catalogue}] {m.titre} — {Math.round(m.score*100)}%</option>
                                    ))}
                                  </select>
                              }
                            </td>
                          )}
                          <td style={{padding:"9px 14px",whiteSpace:"nowrap"}}>
                            <div style={{display:"flex",gap:4}}>
                              <button onClick={()=>decide(r.id,"v")} style={{background:dec==="v"?C.gBg:"none",color:dec==="v"?C.green:C.muted,border:`1px solid ${dec==="v"?C.green:C.b2}`,borderRadius:2,padding:"5px 12px",fontFamily:mono,fontSize:9,letterSpacing:"0.1em",cursor:"pointer",textTransform:"uppercase",transition:"all .15s"}}>✓ Valider</button>
                              <button onClick={()=>decide(r.id,"j")} style={{background:dec==="j"?C.rBg:"none",color:dec==="j"?C.red:C.muted,border:`1px solid ${dec==="j"?C.red:C.b2}`,borderRadius:2,padding:"5px 12px",fontFamily:mono,fontSize:9,letterSpacing:"0.1em",cursor:"pointer",textTransform:"uppercase",transition:"all .15s"}}>✕ Rejeter</button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              {/* Pagination bas */}
              {pageCount>1&&(
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,marginTop:12}}>
                  <button onClick={()=>setPage(0)} disabled={safePage===0} style={{...ghostBtn,padding:"5px 10px",fontSize:9,opacity:safePage===0?.3:1}}>«</button>
                  <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={safePage===0} style={{...ghostBtn,padding:"5px 10px",fontSize:9,opacity:safePage===0?.3:1}}>‹</button>
                  {Array.from({length:Math.min(7,pageCount)},(_,i)=>{
                    let p;
                    if(pageCount<=7) p=i;
                    else if(safePage<4) p=i;
                    else if(safePage>pageCount-5) p=pageCount-7+i;
                    else p=safePage-3+i;
                    return(
                      <button key={p} onClick={()=>setPage(p)} style={{...ghostBtn,padding:"5px 12px",fontSize:9,background:p===safePage?C.accent:"none",color:p===safePage?C.bg:C.muted,border:`1px solid ${p===safePage?C.accent:C.b2}`}}>{p+1}</button>
                    );
                  })}
                  <button onClick={()=>setPage(p=>Math.min(pageCount-1,p+1))} disabled={safePage>=pageCount-1} style={{...ghostBtn,padding:"5px 10px",fontSize:9,opacity:safePage>=pageCount-1?.3:1}}>›</button>
                  <button onClick={()=>setPage(pageCount-1)} disabled={safePage>=pageCount-1} style={{...ghostBtn,padding:"5px 10px",fontSize:9,opacity:safePage>=pageCount-1?.3:1}}>»</button>
                </div>
              )}

              <div style={{marginTop:14,display:"flex",alignItems:"center",gap:16}}>
                <button onClick={reset} style={ghostBtn}>← Nouvelle session</button>
                <span style={{fontFamily:mono,fontSize:9,color:C.muted,letterSpacing:"0.08em"}}>{terms.length} terme{terms.length!==1?"s":""} conservé{terms.length!==1?"s":""} pour la prochaine session</span>
              </div>
            </>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
