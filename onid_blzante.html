<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONID BLZante — BLZante Toolbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0d0d;
      --border:  #2a2a2a;
      --text:    #f0ede6;
      --muted:   #555;
      --accent:  #e8c547;
      --surface: #111111;
      --surface2:#161616;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
    nav {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 12px;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      font-family: 'Syne Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.1em;
    }
    nav a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
    nav a:hover { color: var(--accent); }
    .nav-sep { color: var(--border); }
    .nav-current { color: var(--text); font-weight: 600; }
    #root { position: relative; z-index: 1; flex: 1; padding: 28px 40px 48px; }
    @media (max-width: 700px) { nav, #root { padding-left: 20px; padding-right: 20px; } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">← BLZante Toolbox</a>
    <span class="nav-sep">/</span>
    <span class="nav-current">ONID BLZante</span>
  </nav>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useCallback, useRef } = React;
    const XL = XLSX;

    // ─── Utils ────────────────────────────────────────────────────────────────

    function normalize(str) {
      if (str == null) return "";
      return str.toString().toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9\s]/g, " ").replace(/\s+/g, " ").trim();
    }

    function tokenize(s) { return normalize(s).split(" ").filter(Boolean); }

    function jaccardSim(a, b) {
      const sa = new Set(tokenize(a)), sb = new Set(tokenize(b));
      if (!sa.size && !sb.size) return 1;
      const inter = [...sa].filter(x => sb.has(x)).length;
      return inter / (sa.size + sb.size - inter);
    }

    function levenshtein(a, b) {
      const na = normalize(a), nb = normalize(b);
      const m = na.length, n = nb.length;
      if (!m) return n; if (!n) return m;
      const prev = [...Array(n+1).keys()], curr = new Array(n+1);
      for (let i = 1; i <= m; i++) {
        curr[0] = i;
        for (let j = 1; j <= n; j++)
          curr[j] = na[i-1] === nb[j-1] ? prev[j-1] : 1 + Math.min(prev[j], curr[j-1], prev[j-1]);
        prev.splice(0, n+1, ...curr);
      }
      return prev[n];
    }

    function fuzzyScore(q, c) {
      const jac = jaccardSim(q, c);
      const maxL = Math.max(normalize(q).length, normalize(c).length);
      const lev = maxL ? 1 - levenshtein(q, c) / maxL : 1;
      return 0.65 * jac + 0.35 * lev;
    }

    function bestCatalogMatches(titre, catalogues, topN = 4) {
      const all = [];
      for (const { name, rows, col } of catalogues) {
        rows.forEach(row => {
          const t = (row[col] || "").toString();
          if (!t) return;
          const score = fuzzyScore(titre, t);
          if (score > 0.1) all.push({ titre: t, score, catalogue: name });
        });
      }
      return all.sort((a, b) => b.score - a.score).slice(0, topN);
    }

    function readExcel(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = e => {
          try {
            const wb = XL.read(new Uint8Array(e.target.result), { type: "array" });
            res(XL.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" }));
          } catch(err) { rej(err); }
        };
        r.onerror = rej;
        r.readAsArrayBuffer(file);
      });
    }

    // Détection auto des colonnes — connaît les noms SACEM standards
    function autoCol(rows, ...hints) {
      if (!rows.length) return "";
      const keys = Object.keys(rows[0]);
      for (const h of hints) {
        const f = keys.find(k => normalize(k) === normalize(h));
        if (f) return f;
      }
      for (const h of hints) {
        const f = keys.find(k => normalize(k).includes(normalize(h)));
        if (f) return f;
      }
      return keys[0];
    }

    // ─── Persistance ──────────────────────────────────────────────────────────

    const SK = "onid_blzante_termes";
    const loadTerms = () => { try { const v = localStorage.getItem(SK); return v ? JSON.parse(v) : []; } catch { return []; } };
    const saveTerms = t => { try { localStorage.setItem(SK, JSON.stringify(t)); } catch {} };

    // ─── Design ───────────────────────────────────────────────────────────────

    const C = {
      bg: "#0d0d0d", surface: "#111", surface2: "#161616", surface3: "#1a1a1a",
      border: "#2a2a2a", border2: "#333",
      text: "#f0ede6", muted: "#555", muted2: "#888",
      accent: "#e8c547",
      green: "#4ade80", greenBg: "#0a1a0a", greenBorder: "#1a4a1a",
      red: "#f87171",   redBg:   "#1a0a0a", redBorder:   "#4a1a1a",
      violet: "#a78bfa", blue: "#60a5fa",
    };

    const mono = "'Syne Mono', monospace";
    const syne = "'Syne', sans-serif";

    const S = {
      card: { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 3, padding: 24 },
      btn: (active, accent) => {
        const a = accent || C.accent;
        return {
          background: active ? a : C.surface2,
          color: active ? C.bg : C.muted,
          border: `1px solid ${active ? a : C.border2}`,
          borderRadius: 2, padding: "8px 18px",
          fontFamily: mono, fontSize: 10, fontWeight: 700,
          letterSpacing: "0.12em", textTransform: "uppercase",
          cursor: "pointer", transition: "all 0.15s",
        };
      },
      ghostBtn: {
        background: "none", border: `1px solid ${C.border2}`,
        borderRadius: 2, padding: "8px 18px",
        fontFamily: mono, fontSize: 10, fontWeight: 700,
        letterSpacing: "0.12em", textTransform: "uppercase",
        color: C.muted, cursor: "pointer", transition: "all 0.15s",
      },
      select: {
        width: "100%", padding: "8px 10px", borderRadius: 2,
        border: `1px solid ${C.border2}`, fontSize: 12,
        background: C.surface2, color: C.text, fontFamily: mono,
        cursor: "pointer",
      },
      input: {
        padding: "9px 13px", borderRadius: 2,
        border: `1px solid ${C.border2}`,
        fontSize: 13, background: C.surface2, color: C.text,
        outline: "none", width: "100%", boxSizing: "border-box",
        fontFamily: "'Inter', sans-serif",
      },
      sectionLabel: {
        fontFamily: mono, fontSize: 9, fontWeight: 700, color: C.muted,
        letterSpacing: "0.22em", textTransform: "uppercase",
        display: "block", marginBottom: 8,
      },
    };

    const CATS = [
      { key: "blzante",    name: "BLZante",    color: C.accent  },
      { key: "rossinante", name: "Rossinante", color: C.violet  },
      { key: "blz",        name: "BLZ",        color: C.blue    },
    ];

    // ─── Composant principal ──────────────────────────────────────────────────

    function App() {
      const [step, setStep]         = useState(1);
      const [tab, setTab]           = useState("upload");

      // ONID
      const [onidData, setOnidData] = useState([]);
      const [onidFile, setOnidFile] = useState("");
      const [colTitre, setColTitre] = useState(""); // ex: TITROEUV
      const [colAyant, setColAyant] = useState(""); // ex: AD

      // Catalogues
      const [cats, setCats]         = useState({ blzante: [], rossinante: [], blz: [] });
      const [catFiles, setCatFiles] = useState({ blzante: "", rossinante: "", blz: "" });
      const [catCols, setCatCols]   = useState({ blzante: "", rossinante: "", blz: "" });

      // Termes
      const [terms, setTerms]       = useState(() => loadTerms());
      const [newTerm, setNewTerm]   = useState("");

      // Résultats
      const [results, setResults]   = useState([]);
      const [decisions, setDec]     = useState({});
      const [selCat, setSelCat]     = useState({});
      const [filter, setFilter]     = useState("all");

      const [loading, setLoading]   = useState(false);
      const [err, setErr]           = useState("");
      const [msg, setMsg]           = useState("");

      const onidCols  = onidData.length ? Object.keys(onidData[0]) : [];
      const anyCat    = CATS.some(c => cats[c.key].length > 0);
      const montantKey = onidCols.find(k => /montant|amount|somme/i.test(k));

      const persistTerms = useCallback(t => { setTerms(t); saveTerms(t); }, []);

      // ── Termes ──────────────────────────────────────────────────────────────

      function addTerm() {
        const t = newTerm.trim();
        if (!t) return;
        if (terms.some(x => normalize(x) === normalize(t))) { setErr("Terme déjà présent."); return; }
        persistTerms([...terms, t]);
        setNewTerm(""); setErr(""); setMsg("");
      }
      function removeTerm(i) { persistTerms(terms.filter((_, j) => j !== i)); }
      async function importFile(file) {
        try {
          const rows = await readExcel(file);
          if (!rows.length) { setErr("Fichier vide."); return; }
          const col = Object.keys(rows[0])[0];
          const incoming = rows.map(r => (r[col] || "").toString().trim()).filter(Boolean);
          const merged = [...terms]; let added = 0;
          incoming.forEach(t => { if (!merged.some(x => normalize(x) === normalize(t))) { merged.push(t); added++; } });
          persistTerms(merged);
          setErr(""); setMsg(`✓ ${added} terme(s) importé(s), ${incoming.length - added} doublon(s) ignoré(s).`);
        } catch(e) { setErr("Erreur import : " + e.message); }
      }

      // ── Fichiers ─────────────────────────────────────────────────────────────

      async function loadOnid(file) {
        try {
          const rows = await readExcel(file);
          if (!rows.length) { setErr("Fichier ONID vide."); return; }
          setOnidData(rows); setOnidFile(file.name);
          // Détection prioritaire des noms SACEM standards
          setColTitre(autoCol(rows, "TITROEUV", "titre", "oeuvre", "libelle", "title"));
          setColAyant(autoCol(rows, "AD", "ayant", "artiste", "editeur", "compositeur", "author"));
          setErr(""); setMsg(`✓ ${rows.length} lignes chargées — colonnes détectées automatiquement.`);
        } catch(e) { setErr("Erreur ONID : " + e.message); }
      }

      async function loadCat(key, file) {
        try {
          const rows = await readExcel(file);
          if (!rows.length) { setErr(`Catalogue ${key} vide.`); return; }
          // Cherche "Titre de l'oeuvre" ou fallback
          const col = autoCol(rows, "Titre de l'oeuvre", "titre", "oeuvre", "libelle", "title");
          setCats(c => ({ ...c, [key]: rows }));
          setCatFiles(f => ({ ...f, [key]: file.name }));
          setCatCols(c => ({ ...c, [key]: col }));
          setErr(""); setMsg("");
        } catch(e) { setErr("Erreur catalogue : " + e.message); }
      }

      // ── Lancement de la recherche ────────────────────────────────────────────

      function runSearch() {
        setLoading(true); setErr(""); setMsg("");
        setTimeout(() => {
          try {
            const activeCats = CATS
              .filter(c => cats[c.key].length > 0)
              .map(c => ({ name: c.name, rows: cats[c.key], col: catCols[c.key] }));

            // Pour chaque terme, on collecte toutes les lignes ONID correspondantes
            // Une même ligne ONID peut matcher plusieurs termes — on garde le premier terme qui l'a matchée
            const seenRows = new Set();
            const matches  = [];

            terms.forEach(terme => {
              const nt = normalize(terme);
              onidData.forEach((row, i) => {
                const titre = (row[colTitre] || "").toString();
                const ayant = (row[colAyant] || "").toString();
                const matchTitre = normalize(titre).includes(nt);
                const matchAyant = normalize(ayant).includes(nt);

                if (matchTitre || matchAyant) {
                  if (!seenRows.has(i)) {
                    seenRows.add(i);
                    // Catalogue : on tente un fuzzy sur le titre ONID
                    // Le résultat peut être vide — la ligne apparaît quand même
                    const catMatches = activeCats.length > 0
                      ? bestCatalogMatches(titre, activeCats)
                      : [];

                    matches.push({
                      id: String(i),
                      terme,
                      matchIn: matchTitre && matchAyant ? "titre + ayant droit"
                               : matchTitre ? "titre" : "ayant droit",
                      row,
                      catMatches,
                    });
                  }
                }
              });
            });

            setResults(matches);
            setDec({}); setSelCat({});
            setStep(3); setFilter("all");
          } catch(e) { setErr("Erreur : " + e.message); }
          setLoading(false);
        }, 30);
      }

      // ── Décisions ────────────────────────────────────────────────────────────

      const decide  = useCallback((id, d) => setDec(p => ({ ...p, [id]: p[id] === d ? undefined : d })), []);
      const pickCat = useCallback((id, v) => setSelCat(p => ({ ...p, [id]: v })), []);

      const stats = useMemo(() => ({
        total:   results.length,
        v:       results.filter(r => decisions[r.id] === "v").length,
        j:       results.filter(r => decisions[r.id] === "j").length,
        pending: results.filter(r => !decisions[r.id]).length,
      }), [results, decisions]);

      const visible = useMemo(() => {
        if (filter === "pending") return results.filter(r => !decisions[r.id]);
        if (filter === "v")       return results.filter(r => decisions[r.id] === "v");
        if (filter === "j")       return results.filter(r => decisions[r.id] === "j");
        return results;
      }, [results, decisions, filter]);

      function exportXlsx() {
        const rows = results.filter(r => decisions[r.id] === "v").map(r => ({
          ...r.row,
          "Terme trouvé":      r.terme,
          "Oeuvre identifiée": selCat[r.id] || "",
        }));
        const ws = XL.utils.json_to_sheet(rows);
        const wb = XL.utils.book_new();
        XL.utils.book_append_sheet(wb, ws, "Validées");
        XL.writeFile(wb, "ONID_validees.xlsx");
      }

      function reset() {
        setStep(1); setResults([]); setDec({}); setSelCat({});
        setOnidData([]); setOnidFile("");
        setCats({ blzante: [], rossinante: [], blz: [] });
        setCatFiles({ blzante: "", rossinante: "", blz: "" });
        setFilter("all"); setErr(""); setMsg(""); setTab("upload");
      }

      // ─────────────────────────────────────────────────────────────────────────
      // RENDER
      // ─────────────────────────────────────────────────────────────────────────

      return (
        <div style={{ maxWidth: 1300, margin: "0 auto" }}>

          {/* ── Titre page ── */}
          <div style={{ marginBottom: 22 }}>
            <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, letterSpacing: "0.24em", textTransform: "uppercase", marginBottom: 6 }}>
              Outils / SACEM
            </div>
            <h1 style={{ fontFamily: syne, fontSize: 20, fontWeight: 800, color: C.text, letterSpacing: "-0.01em" }}>
              ONID BLZante
            </h1>
            <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginTop: 4, letterSpacing: "0.06em" }}>
              Identification des Oeuvres Non Identifiées SACEM
            </div>
          </div>

          {/* ── Stepper ── */}
          <div style={{ display: "flex", gap: 0, marginBottom: 24, borderBottom: `1px solid ${C.border}` }}>
            {["1 — Fichiers & Termes", "2 — Recherche", "3 — Résultats"].map((lbl, i) => (
              <div key={i} style={{
                padding: "10px 24px",
                fontFamily: mono, fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase",
                color: step === i+1 ? C.accent : step > i+1 ? C.muted2 : C.muted,
                borderBottom: step === i+1 ? `2px solid ${C.accent}` : "2px solid transparent",
                marginBottom: -1,
              }}>
                {step > i+1 ? "✓ " : ""}{lbl}
              </div>
            ))}
          </div>

          {/* ── Notifs ── */}
          {err && (
            <div style={{ background: C.redBg, border: `1px solid ${C.redBorder}`, borderRadius: 2, padding: "9px 16px", marginBottom: 14, color: C.red, fontSize: 12, fontFamily: mono, letterSpacing: "0.04em" }}>
              ⚠ {err}
            </div>
          )}
          {msg && !err && (
            <div style={{ background: C.greenBg, border: `1px solid ${C.greenBorder}`, borderRadius: 2, padding: "9px 16px", marginBottom: 14, color: C.green, fontSize: 12, fontFamily: mono, letterSpacing: "0.04em" }}>
              {msg}
            </div>
          )}

          {/* ══════════════════════════════════════════════════
              ÉTAPE 1 — Fichiers & Termes
          ══════════════════════════════════════════════════ */}
          {step === 1 && (
            <>
              <div style={{ display: "flex", gap: 1, marginBottom: 18, borderBottom: `1px solid ${C.border}` }}>
                {[{ k: "upload", lbl: "Fichiers" }, { k: "termes", lbl: `Termes (${terms.length})` }].map(({ k, lbl }) => (
                  <button key={k} onClick={() => { setTab(k); setErr(""); setMsg(""); }} style={{
                    background: "none", border: "none",
                    borderBottom: tab === k ? `2px solid ${C.accent}` : "2px solid transparent",
                    padding: "8px 20px", marginBottom: -1,
                    fontFamily: mono, fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase",
                    color: tab === k ? C.accent : C.muted,
                    cursor: "pointer", transition: "all 0.15s",
                  }}>{lbl}</button>
                ))}
              </div>

              {/* ─ Onglet Fichiers ─ */}
              {tab === "upload" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

                  {/* ONID */}
                  <div style={{ ...S.card, borderColor: onidData.length ? C.accent + "66" : C.border }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                      <div style={{ flex: 1 }}>
                        <span style={S.sectionLabel}>Fichier ONID <span style={{ color: C.red }}>*requis</span></span>
                        <div style={{ fontFamily: syne, fontWeight: 700, fontSize: 14, color: C.text }}>
                          Export SACEM — Oeuvres Non Identifiées
                        </div>
                        {onidData.length > 0 && (
                          <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginTop: 6, letterSpacing: "0.04em" }}>
                            {onidFile} &nbsp;·&nbsp; {onidData.length} lignes &nbsp;·&nbsp;
                            colonnes détectées : <span style={{ color: C.accent }}>{colTitre}</span> (titre) &nbsp;+&nbsp; <span style={{ color: C.accent }}>{colAyant}</span> (ayant droit)
                          </div>
                        )}
                      </div>
                      {onidData.length > 0 ? (
                        <label style={{ ...S.ghostBtn, cursor: "pointer" }}>
                          Changer <input type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={e => e.target.files[0] && loadOnid(e.target.files[0])} />
                        </label>
                      ) : (
                        <label style={{ ...S.btn(true), cursor: "pointer" }}>
                          Charger <input type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={e => e.target.files[0] && loadOnid(e.target.files[0])} />
                        </label>
                      )}
                    </div>
                  </div>

                  {/* Catalogues */}
                  <div style={S.card}>
                    <span style={S.sectionLabel}>Catalogues <span style={{ color: C.muted, fontWeight: 400 }}>(optionnel — pour le matching)</span></span>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 1, background: C.border, border: `1px solid ${C.border}` }}>
                      {CATS.map(({ key, name, color }) => {
                        const loaded = cats[key].length > 0;
                        return (
                          <div key={key} style={{ background: C.surface2, padding: 14, borderTop: `2px solid ${loaded ? color : "transparent"}` }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 10 }}>
                              <div style={{ width: 7, height: 7, borderRadius: "50%", background: color, opacity: loaded ? 1 : 0.25 }} />
                              <span style={{ fontFamily: syne, fontWeight: 700, fontSize: 13, color: loaded ? C.text : C.muted }}>{name}</span>
                            </div>
                            {loaded ? (
                              <>
                                <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginBottom: 8, wordBreak: "break-all", letterSpacing: "0.04em" }}>{catFiles[key]}</div>
                                <div style={{ fontFamily: mono, fontSize: 10, color, letterSpacing: "0.06em", marginBottom: 10 }}>{cats[key].length} oeuvres</div>
                                <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginBottom: 10, letterSpacing: "0.04em" }}>
                                  Colonne titre : <span style={{ color: C.text }}>{catCols[key]}</span>
                                </div>
                                <label style={{ ...S.ghostBtn, fontSize: 9, cursor: "pointer" }}>
                                  Changer <input type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={e => e.target.files[0] && loadCat(key, e.target.files[0])} />
                                </label>
                              </>
                            ) : (
                              <label style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, cursor: "pointer", padding: "18px 0" }}>
                                <span style={{ fontSize: 20, opacity: 0.3 }}>📚</span>
                                <span style={{ fontFamily: mono, fontSize: 9, color: C.muted, letterSpacing: "0.1em" }}>Cliquer pour charger</span>
                                <input type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={e => e.target.files[0] && loadCat(key, e.target.files[0])} />
                              </label>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, paddingTop: 4 }}>
                    <button onClick={() => { setTab("termes"); setErr(""); setMsg(""); }} style={S.ghostBtn}>
                      Gérer les termes ({terms.length}) →
                    </button>
                    <button onClick={() => {
                      if (!onidData.length) { setErr("Chargez le fichier ONID."); return; }
                      if (!terms.length)    { setErr("Ajoutez au moins un terme de recherche."); return; }
                      setStep(2); setErr(""); setMsg("");
                    }} style={{ ...S.btn(true), opacity: (!onidData.length || !terms.length) ? 0.35 : 1 }}>
                      Configurer la recherche →
                    </button>
                  </div>
                </div>
              )}

              {/* ─ Onglet Termes ─ */}
              {tab === "termes" && (
                <div style={S.card}>
                  <span style={S.sectionLabel}>Bibliothèque de termes</span>
                  <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginBottom: 18, letterSpacing: "0.04em", lineHeight: 1.8 }}>
                    Chaque terme est cherché dans les colonnes titre et ayant droit du fichier ONID.<br />
                    Les termes sont sauvegardés dans le navigateur et réutilisables à chaque session.
                  </div>

                  <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
                    <input style={{ ...S.input, flex: 1 }}
                      placeholder="Ex : DAFT PUNK, MAES, IAM, SOPRANO…"
                      value={newTerm}
                      onChange={e => setNewTerm(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && addTerm()}
                    />
                    <button onClick={addTerm} style={S.btn(true)}>+ Ajouter</button>
                    <label style={{ ...S.ghostBtn, cursor: "pointer" }}>
                      ↑ Importer
                      <input type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={e => e.target.files[0] && importFile(e.target.files[0])} />
                    </label>
                  </div>

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                    <span style={{ fontFamily: mono, fontSize: 9, color: C.muted, letterSpacing: "0.18em" }}>
                      {terms.length} TERME{terms.length !== 1 ? "S" : ""} ENREGISTRÉ{terms.length !== 1 ? "S" : ""}
                    </span>
                    {terms.length > 0 && (
                      <button onClick={() => { if (window.confirm("Vider toute la bibliothèque ?")) persistTerms([]); }}
                        style={{ background: "none", border: "none", color: C.red, fontSize: 10, cursor: "pointer", fontFamily: mono, letterSpacing: "0.1em" }}>
                        ✕ Tout effacer
                      </button>
                    )}
                  </div>

                  {terms.length === 0 ? (
                    <div style={{ textAlign: "center", padding: "36px 0", color: C.muted, fontFamily: mono, fontSize: 10, lineHeight: 2.2, letterSpacing: "0.1em" }}>
                      AUCUN TERME ENREGISTRÉ
                    </div>
                  ) : (
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                      {terms.map((t, i) => (
                        <div key={i} style={{
                          background: C.surface2, border: `1px solid ${C.border2}`,
                          borderRadius: 2, padding: "5px 8px 5px 12px",
                          display: "flex", alignItems: "center", gap: 8,
                          fontFamily: mono, fontSize: 11, color: C.text, letterSpacing: "0.04em",
                        }}>
                          {t}
                          <button onClick={() => removeTerm(i)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 13, padding: 0, lineHeight: 1 }}>×</button>
                        </div>
                      ))}
                    </div>
                  )}

                  <div style={{ marginTop: 20, display: "flex", justifyContent: "flex-end" }}>
                    <button onClick={() => { setTab("upload"); setErr(""); setMsg(""); }} style={S.btn(true)}>← Retour aux fichiers</button>
                  </div>
                </div>
              )}
            </>
          )}

          {/* ══════════════════════════════════════════════════
              ÉTAPE 2 — Configuration de la recherche
          ══════════════════════════════════════════════════ */}
          {step === 2 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

              {/* Bloc principal : colonnes ONID */}
              <div style={S.card}>
                <span style={S.sectionLabel}>Colonnes du fichier ONID</span>
                <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginBottom: 20, letterSpacing: "0.04em", lineHeight: 1.8 }}>
                  Les termes seront recherchés dans ces deux colonnes. Vérifie que les bonnes colonnes sont sélectionnées.
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                  {/* Colonne titre */}
                  <div style={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 2, padding: 16 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                      <div style={{ width: 7, height: 7, borderRadius: "50%", background: C.accent }} />
                      <span style={{ fontFamily: syne, fontWeight: 700, fontSize: 13, color: C.text }}>Titre de l'oeuvre</span>
                      <span style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginLeft: "auto", letterSpacing: "0.08em" }}>SACEM : TITROEUV</span>
                    </div>
                    <select value={colTitre} onChange={e => setColTitre(e.target.value)} style={S.select}>
                      {onidCols.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                    <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginTop: 8, letterSpacing: "0.04em" }}>
                      Exemple : « {(onidData[0] && onidData[0][colTitre]) || "—"} »
                    </div>
                  </div>

                  {/* Colonne ayant droit */}
                  <div style={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 2, padding: 16 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                      <div style={{ width: 7, height: 7, borderRadius: "50%", background: C.accent }} />
                      <span style={{ fontFamily: syne, fontWeight: 700, fontSize: 13, color: C.text }}>Ayant droit</span>
                      <span style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginLeft: "auto", letterSpacing: "0.08em" }}>SACEM : AD</span>
                    </div>
                    <select value={colAyant} onChange={e => setColAyant(e.target.value)} style={S.select}>
                      {onidCols.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                    <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginTop: 8, letterSpacing: "0.04em" }}>
                      Exemple : « {(onidData[0] && onidData[0][colAyant]) || "—"} »
                    </div>
                  </div>
                </div>
              </div>

              {/* Bloc catalogues (si chargés) */}
              {anyCat && (
                <div style={S.card}>
                  <span style={S.sectionLabel}>Colonnes titre dans les catalogues</span>
                  <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, marginBottom: 16, letterSpacing: "0.04em", lineHeight: 1.8 }}>
                    Le titre ONID sera comparé à ces colonnes pour proposer une oeuvre correspondante.
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
                    {CATS.filter(c => cats[c.key].length > 0).map(({ key, name, color }) => {
                      const opts = Object.keys((cats[key][0]) || {});
                      return (
                        <div key={key} style={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 2, padding: 14, borderTop: `2px solid ${color}` }}>
                          <div style={{ fontFamily: syne, fontWeight: 700, fontSize: 12, color, marginBottom: 10 }}>{name}</div>
                          <select value={catCols[key]} onChange={e => setCatCols(c => ({ ...c, [key]: e.target.value }))} style={S.select}>
                            {opts.map(o => <option key={o} value={o}>{o}</option>)}
                          </select>
                          <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginTop: 8, letterSpacing: "0.04em" }}>
                            Exemple : « {(cats[key][0] && cats[key][0][catCols[key]]) || "—"} »
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Récap avant lancement */}
              <div style={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 2, padding: "14px 20px" }}>
                <div style={{ fontFamily: mono, fontSize: 10, color: C.muted, letterSpacing: "0.06em", lineHeight: 2.2 }}>
                  <span style={{ color: C.text }}>{terms.length}</span> terme{terms.length !== 1 ? "s" : ""} à chercher &nbsp;·&nbsp;
                  dans <span style={{ color: C.text }}>{onidData.length}</span> lignes ONID &nbsp;·&nbsp;
                  colonnes : <span style={{ color: C.accent }}>{colTitre}</span> + <span style={{ color: C.accent }}>{colAyant}</span>
                  {anyCat && (
                    <> &nbsp;·&nbsp; matching catalogue : {CATS.filter(c => cats[c.key].length > 0).map(c => (
                      <span key={c.key} style={{ color: c.color }}>{c.name} </span>
                    ))}</>
                  )}
                </div>
              </div>

              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => { setStep(1); setErr(""); setMsg(""); }} style={S.ghostBtn}>← Retour</button>
                <button onClick={runSearch} disabled={loading} style={{ ...S.btn(true), opacity: loading ? 0.5 : 1 }}>
                  {loading ? "⏳ Recherche en cours…" : "Lancer la recherche →"}
                </button>
              </div>
            </div>
          )}

          {/* ══════════════════════════════════════════════════
              ÉTAPE 3 — Résultats
          ══════════════════════════════════════════════════ */}
          {step === 3 && (
            <>
              {/* Stats + export */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr auto", gap: 1, background: C.border, border: `1px solid ${C.border}`, marginBottom: 14 }}>
                {[
                  { lbl: "Trouvées",   val: stats.total,   color: C.text,   f: "all"     },
                  { lbl: "En attente", val: stats.pending, color: "#f59e0b", f: "pending" },
                  { lbl: "Validées",   val: stats.v,       color: C.green,  f: "v"       },
                  { lbl: "Rejetées",   val: stats.j,       color: C.red,    f: "j"       },
                ].map(({ lbl, val, color, f }) => (
                  <div key={f} onClick={() => setFilter(f)} style={{
                    background: filter === f ? C.surface : C.surface2,
                    padding: "14px 18px", cursor: "pointer",
                    borderTop: `2px solid ${filter === f ? color : "transparent"}`,
                    transition: "all 0.15s", userSelect: "none",
                  }}>
                    <div style={{ fontFamily: syne, fontSize: 24, fontWeight: 800, color }}>{val}</div>
                    <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginTop: 3, letterSpacing: "0.14em", textTransform: "uppercase" }}>{lbl}</div>
                  </div>
                ))}
                <button onClick={exportXlsx} disabled={stats.v === 0} style={{
                  background: stats.v ? C.accent : C.surface2,
                  color: stats.v ? C.bg : C.muted,
                  border: "none", cursor: stats.v ? "pointer" : "default",
                  padding: "14px 20px", fontFamily: mono,
                  fontSize: 10, fontWeight: 700, letterSpacing: "0.1em",
                  textTransform: "uppercase", lineHeight: 1.8, transition: "all 0.15s",
                }}>
                  ↓ Export<br />Excel
                </button>
              </div>

              {/* Légende termes + catalogues */}
              <div style={{ display: "flex", gap: 16, marginBottom: 10, alignItems: "center", flexWrap: "wrap" }}>
                <div style={{ display: "flex", gap: 5, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ fontFamily: mono, fontSize: 9, color: C.muted, letterSpacing: "0.12em" }}>TERMES :</span>
                  {terms.map((t, i) => (
                    <span key={i} style={{ fontFamily: mono, fontSize: 9, color: C.accent, background: C.accent + "15", border: `1px solid ${C.accent}33`, borderRadius: 2, padding: "1px 6px", letterSpacing: "0.06em" }}>{t}</span>
                  ))}
                </div>
                {anyCat && (
                  <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                    <span style={{ fontFamily: mono, fontSize: 9, color: C.muted, letterSpacing: "0.12em" }}>CATALOGUES :</span>
                    {CATS.filter(c => cats[c.key].length > 0).map(c => (
                      <span key={c.key} style={{ fontFamily: mono, fontSize: 9, color: c.color, background: c.color + "15", border: `1px solid ${c.color}33`, borderRadius: 2, padding: "1px 6px" }}>{c.name}</span>
                    ))}
                  </div>
                )}
              </div>

              {/* Table résultats */}
              <div style={{ border: `1px solid ${C.border}`, overflow: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr>
                      {["Terme", "Trouvé dans", "Titre ONID", "Ayant droit",
                        montantKey && "Montant",
                        anyCat && "Oeuvre catalogue (fuzzy match)",
                        "Décision"].filter(Boolean).map(h => (
                        <th key={h} style={{
                          padding: "9px 14px", textAlign: "left",
                          fontFamily: mono, fontSize: 9, fontWeight: 700,
                          color: C.muted, letterSpacing: "0.16em", textTransform: "uppercase",
                          background: C.surface2, borderBottom: `1px solid ${C.border}`,
                          whiteSpace: "nowrap",
                        }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {visible.length === 0 && (
                      <tr><td colSpan={8} style={{ padding: 48, textAlign: "center", fontFamily: mono, fontSize: 10, color: C.muted, letterSpacing: "0.1em" }}>
                        {results.length === 0 ? "AUCUNE OEUVRE TROUVÉE AVEC CES TERMES" : "AUCUN RÉSULTAT DANS CE FILTRE"}
                      </td></tr>
                    )}
                    {visible.map((r, idx) => {
                      const dec = decisions[r.id];
                      const rowBg = dec === "v" ? C.greenBg : dec === "j" ? C.redBg : idx % 2 ? C.surface : C.surface2;
                      return (
                        <tr key={r.id} style={{ background: rowBg, borderBottom: `1px solid ${C.border}`, transition: "background 0.15s" }}>

                          {/* Terme */}
                          <td style={{ padding: "9px 14px", whiteSpace: "nowrap" }}>
                            <span style={{ fontFamily: mono, fontSize: 10, color: C.accent, background: C.accent + "15", border: `1px solid ${C.accent}33`, borderRadius: 2, padding: "2px 7px", letterSpacing: "0.06em" }}>
                              {r.terme}
                            </span>
                          </td>

                          {/* Trouvé dans */}
                          <td style={{ padding: "9px 14px", whiteSpace: "nowrap" }}>
                            <span style={{ fontFamily: mono, fontSize: 9, color: C.muted, letterSpacing: "0.06em" }}>{r.matchIn}</span>
                          </td>

                          {/* Titre ONID */}
                          <td style={{ padding: "9px 14px", fontWeight: 600, maxWidth: 220, color: C.text }}>
                            <div style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                              {r.row[colTitre] || "—"}
                            </div>
                          </td>

                          {/* Ayant droit */}
                          <td style={{ padding: "9px 14px", color: C.muted2, maxWidth: 160 }}>
                            <div style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                              {r.row[colAyant] || "—"}
                            </div>
                          </td>

                          {/* Montant */}
                          {montantKey && (
                            <td style={{ padding: "9px 14px", color: C.text, whiteSpace: "nowrap", fontFamily: mono, fontSize: 11 }}>
                              {r.row[montantKey] || "—"}
                            </td>
                          )}

                          {/* Match catalogue */}
                          {anyCat && (
                            <td style={{ padding: "9px 14px", minWidth: 280 }}>
                              {r.catMatches.length === 0 ? (
                                <span style={{ fontFamily: mono, fontSize: 9, color: C.muted, letterSpacing: "0.06em" }}>Pas de correspondance</span>
                              ) : (
                                <select value={selCat[r.id] || ""} onChange={e => pickCat(r.id, e.target.value)} style={{ ...S.select, fontSize: 11 }}>
                                  <option value="">— Sélectionner une oeuvre —</option>
                                  {r.catMatches.map((m, i) => {
                                    const catDef = CATS.find(c => c.name === m.catalogue);
                                    return (
                                      <option key={i} value={`[${m.catalogue}] ${m.titre}`}>
                                        [{m.catalogue}] {m.titre} — {Math.round(m.score * 100)}%
                                      </option>
                                    );
                                  })}
                                </select>
                              )}
                            </td>
                          )}

                          {/* Décision */}
                          <td style={{ padding: "9px 14px", whiteSpace: "nowrap" }}>
                            <div style={{ display: "flex", gap: 4 }}>
                              <button onClick={() => decide(r.id, "v")} style={{
                                background: dec === "v" ? C.greenBg : "none",
                                color: dec === "v" ? C.green : C.muted,
                                border: `1px solid ${dec === "v" ? C.green : C.border2}`,
                                borderRadius: 2, padding: "5px 12px",
                                fontFamily: mono, fontSize: 9, letterSpacing: "0.1em",
                                cursor: "pointer", textTransform: "uppercase", transition: "all 0.15s",
                              }}>✓ Valider</button>
                              <button onClick={() => decide(r.id, "j")} style={{
                                background: dec === "j" ? C.redBg : "none",
                                color: dec === "j" ? C.red : C.muted,
                                border: `1px solid ${dec === "j" ? C.red : C.border2}`,
                                borderRadius: 2, padding: "5px 12px",
                                fontFamily: mono, fontSize: 9, letterSpacing: "0.1em",
                                cursor: "pointer", textTransform: "uppercase", transition: "all 0.15s",
                              }}>✕ Rejeter</button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              <div style={{ marginTop: 14, display: "flex", alignItems: "center", gap: 16 }}>
                <button onClick={reset} style={S.ghostBtn}>← Nouvelle session</button>
                <span style={{ fontFamily: mono, fontSize: 9, color: C.muted, letterSpacing: "0.08em" }}>
                  {terms.length} terme{terms.length !== 1 ? "s" : ""} conservé{terms.length !== 1 ? "s" : ""} pour la prochaine session
                </span>
              </div>
            </>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
