<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Planning — BLZante Toolbox</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap');
:root { --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #e8e8e8; --muted: #777; --accent: #e8c547; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Syne Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.3; pointer-events: none; z-index: 0; }

nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; border-bottom: 1px solid var(--border); position: relative; z-index: 1; }
.nav-logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: 0.08em; display: flex; align-items: center; gap: 10px; }
.nav-logo-img { height: 28px; width: auto; display: block; }
.nav-right { display: flex; align-items: center; gap: 12px; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }
.nav-back { color: var(--muted); text-decoration: none; font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; transition: color 0.15s; }
.nav-back:hover { color: #fff; }
.nav-sep { color: var(--border); }

.container { max-width: 900px; margin: 0 auto; padding: 40px 40px 60px; position: relative; z-index: 1; flex: 1; width: 100%; }

.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
.header-row h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--text); line-height: 1.3; }
.add-btn { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); color: var(--text); text-decoration: none; transition: all 0.2s; }
.add-btn:hover { border-color: #555; color: #fff; }

/* Filters */
.filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-btn {
  font-family: 'Syne Mono', monospace; font-size: 0.62rem; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 5px 12px; background: transparent;
  border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: #555; color: var(--text); }
.filter-btn.active { border-color: var(--accent); color: var(--accent); }
.sw-filters { margin-top: 4px; }
.filter-label { font-size: 0.55rem; color: #444; letter-spacing: 0.1em; text-transform: uppercase; margin-right: 4px; }

/* Stats */
.stats { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 16px; }

/* Month groups */
.month-group { margin-bottom: 24px; }
.month-label {
  font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
}

/* Release items */
.release-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }
.release-item {
  display: grid; grid-template-columns: auto 1fr auto; gap: 12px;
  align-items: center; padding: 12px 14px; background: var(--bg); font-size: 0.72rem;
  transition: background 0.15s;
}
.release-item:hover { background: #111; }
.release-item.annule { opacity: 0.3; text-decoration: line-through; }

.rel-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.rel-edit {
  cursor: pointer; color: #444; font-size: 0.65rem; letter-spacing: 0.06em;
  text-decoration: none; transition: color 0.15s; text-transform: uppercase;
}
.rel-edit:hover { color: var(--text); }

.rel-date { color: #bbb; font-size: 0.7rem; }
.rel-type {
  font-size: 0.58rem; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 6px; border: 1px solid var(--border); text-align: center; color: var(--muted);
}
.rel-status {
  font-size: 0.58rem; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 6px; text-align: center; min-width: 52px;
}
.rel-status.confirme { color: #4ade80; border: 1px solid #1a3a1a; }
.rel-status.tbc { color: #f1c40f; border: 1px solid #4a3e10; }
.rel-status.annule { color: #ff6b6b; border: 1px solid #4a1a1a; }

.rel-info { display: flex; flex-direction: column; gap: 2px; }
.rel-artist { color: #fff; font-weight: 600; }
.rel-title { color: #aaa; font-size: 0.68rem; }
.rel-sw { color: #444; font-size: 0.6rem; }

.empty-msg { text-align: center; padding: 48px 20px; color: #444; font-size: 0.78rem; }
.empty-msg a { color: var(--accent); text-decoration: none; }
.empty-msg a:hover { text-decoration: underline; }

.today-marker { border-left: 2px solid var(--accent); }

@media (max-width: 560px) {
  nav { padding: 16px 20px; }
  .container { padding: 28px 20px 40px; }
  .release-item {
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 4px 8px;
    padding: 10px 12px;
  }
  .rel-meta { grid-column: 1; grid-row: 1; gap: 6px; flex-wrap: wrap; }
  .rel-info { grid-column: 1 / -1; grid-row: 2; }
  .rel-edit { grid-column: 2; grid-row: 1; align-self: center; }
  .rel-date { font-size: 0.65rem; }
  .rel-type, .rel-status { font-size: 0.52rem; padding: 1px 4px; }
}
</style>
</head>

<nav>
  <a class="nav-logo" href="index.html"><img src="blzante_spiral_white.png" alt="BLZante" class="nav-logo-img" /><span>BLZante</span></a>
  <div class="nav-right"><button onclick="firebase.auth().signOut().then(()=>location.href='login.html')" style="background:none;border:1px solid var(--border);color:var(--muted);font-family:'Syne Mono',monospace;font-size:0.55rem;padding:4px 10px;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.15s" onmouseover="this.style.borderColor='#555';this.style.color='#fff'" onmouseout="this.style.borderColor='';this.style.color=''">Déconnexion</button> 
    <a class="nav-back" href="index.html">&larr; Toolbox</a>

</nav>

<div class="container">
  <div class="header-row">
    <h1>Sorties / Certifs / Concerts</h1>
    <div style="display:flex;gap:8px">
      <button class="add-btn" id="exportBtn">⚡ Export PDF</button>
      <a class="add-btn" href="release_create.html">+ Ajouter</a>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">Tout</button>
    <button class="filter-btn" data-filter="Live">Live</button>
    <button class="filter-btn" data-filter="Certification">Certification</button>
    <button class="filter-btn" data-filter="Single">Single</button>
    <button class="filter-btn" data-filter="EP">EP</button>
    <button class="filter-btn" data-filter="Album">Album</button>
  </div>

  <div class="filters sw-filters" id="swFilters">
    <button class="filter-btn active" data-sw="all">Tout</button>
  </div>

  <div class="stats" id="stats"></div>
  <div id="planningContent"></div>
</div>

<div id="pdfRender" style="position:fixed;left:-9999px;top:0;width:794px;overflow:hidden;z-index:-1"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const DB = 'https://blzante-toolbox-default-rtdb.europe-west1.firebasedatabase.app';
const FIREBASE_CONFIG={apiKey:"AIzaSyBuwwcRdlxLf7-ZdmUAi0ajB5uL3y-m800",authDomain:"blzante-toolbox.firebaseapp.com",databaseURL:"https://blzante-toolbox-default-rtdb.europe-west1.firebasedatabase.app",projectId:"blzante-toolbox",storageBucket:"blzante-toolbox.firebasestorage.app",messagingSenderId:"599088931653",appId:"1:599088931653:web:34f936e8302e894afb942c"};
if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
window._fbToken='';
function dbFetch(path,opts){const sep=path.includes('?')?'&':'?';return fetch(DB+path+sep+'auth='+window._fbToken,opts);}
function _waitAuth(){return new Promise((res,rej)=>{firebase.auth().onAuthStateChanged(async u=>{if(!u){window.location.href='login.html';rej();}else{window._fbToken=await u.getIdToken();document.body.style.visibility='visible';res(u);}});});}

const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let activeFilter = 'all';
let activeSw = 'all';
let cachedReleases = [];

async function fetchReleases() {
  try {
    const res = await dbFetch('/releases.json');
    const data = await res.json();
    if (!data) { cachedReleases = []; return; }
    cachedReleases = Object.values(data).sort((a, b) => (a.dateSortable || '').localeCompare(b.dateSortable || ''));
  } catch (err) {
    document.getElementById('stats').textContent = '⚠ Erreur de connexion';
  }
}

function buildSwFilters() {
  const swSet = new Set();
  cachedReleases.forEach(r => {
    if (r.songwriters) {
      const sw = Array.isArray(r.songwriters) ? r.songwriters : [r.songwriters];
      sw.forEach(s => swSet.add(s));
    }
  });
  const sorted = [...swSet].sort();
  const container = document.getElementById('swFilters');
  container.innerHTML = '<button class="filter-btn active" data-sw="all">Tout</button>' +
    sorted.map(sw => `<button class="filter-btn" data-sw="${sw}">${sw}</button>`).join('');
}

function render() {
  let filtered = activeFilter === 'all' ? cachedReleases : cachedReleases.filter(r => r.type === activeFilter);
  if (activeSw !== 'all') {
    filtered = filtered.filter(r => {
      if (!r.songwriters) return false;
      const sw = Array.isArray(r.songwriters) ? r.songwriters : [r.songwriters];
      return sw.includes(activeSw);
    });
  }
  const content = document.getElementById('planningContent');
  const stats = document.getElementById('stats');

  stats.textContent = `${filtered.length} event${filtered.length > 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty-msg">Aucun event pour le moment.<br><a href="release_create.html">Ajouter →</a></div>';
    return;
  }

  const groups = {};
  const today = new Date().toISOString().slice(0, 10);

  filtered.forEach(r => {
    const parts = (r.dateSortable || '').split('-');
    const key = parts[0] + '-' + parts[1];
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  const sortedKeys = Object.keys(groups).sort().reverse();

  let html = '';
  sortedKeys.forEach(key => {
    const [year, month] = key.split('-');
    const monthName = MONTHS_FR[parseInt(month) - 1];
    html += `<div class="month-group">`;
    html += `<div class="month-label">${monthName} ${year}</div>`;
    html += `<div class="release-list">`;

    groups[key].reverse().forEach(r => {
      const isToday = r.dateSortable === today;
      const isPast = r.dateSortable < today;
      const isAnnule = r.status === 'Annulé';
      const swArr = r.songwriters ? (Array.isArray(r.songwriters) ? r.songwriters : [r.songwriters]) : [];
      const swText = swArr.join(', ');
      const st = r.status || 'Confirmé';
      const stClass = st === 'TBC' ? 'tbc' : st === 'Annulé' ? 'annule' : 'confirme';

      html += `<div class="release-item${isToday ? ' today-marker' : ''}${isAnnule ? ' annule' : ''}" data-id="${r.id}" style="${isPast && !isAnnule ? 'opacity:0.5' : ''}">`;
      html += `<div class="rel-meta">`;
      html += `<span class="rel-date">${r.date}</span>`;
      html += `<span class="rel-type">${r.type}</span>`;
      html += `<span class="rel-status ${stClass}">${st}</span>`;
      html += `</div>`;
      html += `<div class="rel-info">`;
      html += `<span class="rel-artist">${r.artist}</span>`;
      html += `<span class="rel-title">${r.title}</span>`;
      if (r.epTrackNames) html += `<span class="rel-sw">${r.epTrackNames.replace(/\n/g, ' · ')}</span>`;
      if (swText) html += `<span class="rel-sw">${swText}</span>`;
      html += `</div>`;
      html += `<a class="rel-edit" href="release_create.html?edit=${r.id}" title="Modifier">edit</a>`;
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  content.innerHTML = html;
}

// Filters
document.getElementById('filters').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('#filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  render();
});

document.getElementById('swFilters').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('#swFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeSw = btn.dataset.sw;
  render();
});

// Init
(async () => {
  try { await _waitAuth(); } catch(e) { return; }

  document.getElementById('stats').textContent = 'Chargement...';
  await fetchReleases();
  buildSwFilters();
  render();
})();

document.getElementById('exportBtn').addEventListener('click', async () => {
  const btn = document.getElementById('exportBtn');
  btn.textContent = '⏳ Génération...';
  btn.disabled = true;

  try {
    // Get filtered data (same as what's displayed)
    let filtered = activeFilter === 'all' ? cachedReleases : cachedReleases.filter(r => r.type === activeFilter);
    if (activeSw !== 'all') {
      filtered = filtered.filter(r => {
        if (!r.songwriters) return false;
        const sw = Array.isArray(r.songwriters) ? r.songwriters : [r.songwriters];
        return sw.includes(activeSw);
      });
    }
    if (!filtered.length) { alert('Aucun event à exporter'); return; }

    // Group by month
    const groups = {};
    filtered.forEach(r => {
      const parts = (r.dateSortable || '').split('-');
      const key = parts[0] + '-' + parts[1];
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    });
    const sortedKeys = Object.keys(groups).sort().reverse();

    // Build PDF HTML
    const render = document.getElementById('pdfRender');
    render.style.width = '794px';
    render.style.minHeight = '1123px';
    render.style.height = 'auto';

    let h = '';
    // Background grid
    h += '<div style="position:absolute;inset:0;background-color:#0a0a0a;background-image:linear-gradient(rgba(38,38,38,0.4) 1px,transparent 1px),linear-gradient(90deg,rgba(38,38,38,0.4) 1px,transparent 1px);background-size:60px 60px;z-index:0"></div>';
    h += '<div style="position:relative;z-index:1;padding:36px 40px 30px;font-family:Syne,Arial,sans-serif;color:#e8e8e8">';

    // Header
    h += '<div style="display:flex;align-items:center;gap:14px;margin-bottom:6px">';
    h += `<img src="${NAV_LOGO}" style="height:34px;width:auto" crossorigin="anonymous" />`;
    h += '<div style="font-size:1.4rem;font-weight:800;letter-spacing:0.04em;color:#fff">Planning BLZante</div>';
    h += '</div>';

    // Subtitle with filter info
    let subtitle = '';
    if (activeFilter !== 'all') subtitle += activeFilter;
    if (activeSw !== 'all') subtitle += (subtitle ? ' · ' : '') + activeSw;
    if (!subtitle) subtitle = 'Toutes les sorties';
    const today = new Date();
    const dateStr = today.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
    h += `<div style="font-family:Syne Mono,monospace;font-size:0.58rem;color:#666;letter-spacing:0.1em;margin-bottom:4px">${subtitle} — ${filtered.length} event${filtered.length > 1 ? 's' : ''} — ${dateStr}</div>`;
    h += '<div style="height:1px;background:linear-gradient(90deg,rgba(232,197,71,0.4),rgba(255,255,255,0.08) 50%,transparent);margin-bottom:20px"></div>';

    // Months
    sortedKeys.forEach(key => {
      const [year, month] = key.split('-');
      const monthName = MONTHS_FR[parseInt(month) - 1];
      h += `<div style="font-size:0.72rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#888;margin-bottom:8px;margin-top:16px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.08)">${monthName} ${year}</div>`;

      groups[key].reverse().forEach(r => {
        const st = r.status || 'Confirmé';
        const stColor = st === 'TBC' ? '#f1c40f' : st === 'Annulé' ? '#ff6b6b' : '#4ade80';
        const stBorder = st === 'TBC' ? '#4a3e10' : st === 'Annulé' ? '#4a1a1a' : '#1a3a1a';
        const isAnnule = st === 'Annulé';
        const swArr = r.songwriters ? (Array.isArray(r.songwriters) ? r.songwriters : [r.songwriters]) : [];

        h += `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);margin-bottom:3px;${isAnnule ? 'opacity:0.3;text-decoration:line-through;' : ''}">`;

        // Date
        h += `<div style="font-family:Syne Mono,monospace;font-size:0.65rem;color:#bbb;min-width:70px;flex-shrink:0">${r.date}</div>`;

        // Type badge
        h += `<div style="font-family:Syne Mono,monospace;font-size:0.52rem;letter-spacing:0.06em;text-transform:uppercase;padding:2px 7px;border:1px solid rgba(255,255,255,0.12);color:#999;min-width:48px;text-align:center;flex-shrink:0">${r.type}</div>`;

        // Status badge
        h += `<div style="font-family:Syne Mono,monospace;font-size:0.52rem;letter-spacing:0.06em;text-transform:uppercase;padding:2px 7px;border:1px solid ${stBorder};color:${stColor};min-width:48px;text-align:center;flex-shrink:0">${st}</div>`;

        // Info
        h += '<div style="flex:1;min-width:0">';
        h += `<div style="font-weight:700;color:#fff;font-size:0.72rem">${r.artist}</div>`;
        h += `<div style="color:#aaa;font-size:0.62rem;font-family:Syne Mono,monospace">${r.title}</div>`;
        if (r.epTrackNames) h += `<div style="color:#555;font-size:0.54rem;font-family:Syne Mono,monospace;margin-top:1px">${r.epTrackNames.replace(/\n/g, ' · ')}</div>`;
        if (swArr.length) h += `<div style="color:#555;font-size:0.54rem;font-family:Syne Mono,monospace;margin-top:1px">✍ ${swArr.join(', ')}</div>`;
        h += '</div>';

        h += '</div>';
      });
    });

    // Footer
    h += `<div style="display:flex;justify-content:center;margin-top:24px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)">`;
    h += `<img src="${NAV_LOGO}" style="height:24px;opacity:0.4" crossorigin="anonymous" />`;
    h += '</div>';

    h += '</div>'; // close content

    render.innerHTML = h;

    // Wait for images
    const allImgs = render.querySelectorAll('img');
    await Promise.all(Array.from(allImgs).map(img => {
      if (img.complete) return Promise.resolve();
      return new Promise(res => { img.onload = res; img.onerror = res; });
    }));
    await new Promise(r => setTimeout(r, 300));

    // Measure actual height for multi-page support
    const totalH = render.scrollHeight;
    const pageH = 1123;
    const pages = Math.ceil(totalH / pageH);

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    for (let i = 0; i < pages; i++) {
      if (i > 0) pdf.addPage();
      const canvas = await html2canvas(render, {
        width: 794, height: pageH, scale: 2,
        backgroundColor: '#0a0a0a', useCORS: true, allowTaint: true,
        y: i * pageH, scrollY: -i * pageH,
        windowHeight: pageH,
      });
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
    }

    render.innerHTML = '';
    render.style.height = '0';

    const now = new Date();
    const yyyymmdd = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
    const blob = pdf.output('blob');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${yyyymmdd}_Planning_BLZante.pdf`;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  } catch(err) {
    console.error(err);
    alert('Erreur export PDF');
  } finally {
    btn.textContent = '⚡ Export PDF';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
