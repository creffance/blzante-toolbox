<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — BLZante Toolbox</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap');
:root { --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #e8e8e8; --muted: #777; --accent: #e8c547; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.3; pointer-events: none; z-index: 0; }

.login-box {
  position: relative; z-index: 1; width: 380px; max-width: 90vw;
  background: var(--surface); border: 1px solid var(--border); padding: 40px 36px;
}
.login-logo {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 8px;
}
.login-logo img { height: 36px; }
.login-logo span { font-size: 1.6rem; font-weight: 800; letter-spacing: 0.08em; }
.login-sub {
  text-align: center; font-family: 'Syne Mono', monospace; font-size: 0.6rem;
  color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 28px;
}
.login-sep {
  height: 1px; background: linear-gradient(90deg, transparent, rgba(232,197,71,0.3), transparent);
  margin-bottom: 24px;
}

.login-input {
  width: 100%; padding: 10px 14px; margin-bottom: 12px;
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  font-family: 'Syne Mono', monospace; font-size: 0.78rem; outline: none;
  transition: border-color 0.15s;
}
.login-input:focus { border-color: #555; }
.login-input::placeholder { color: #444; }

.login-btn {
  width: 100%; padding: 12px; margin-top: 4px;
  background: var(--accent); border: none; color: #0a0a0a;
  font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
  transition: opacity 0.15s;
}
.login-btn:hover { opacity: 0.85; }
.login-btn:disabled { opacity: 0.4; cursor: wait; }

.login-divider {
  display: flex; align-items: center; gap: 12px; margin: 20px 0;
  font-family: 'Syne Mono', monospace; font-size: 0.58rem; color: #444;
  letter-spacing: 0.1em; text-transform: uppercase;
}
.login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.login-google {
  width: 100%; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;
  background: transparent; border: 1px solid var(--border); color: var(--text);
  font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s;
}
.login-google:hover { border-color: #555; background: rgba(255,255,255,0.03); }
.login-google svg { flex-shrink: 0; }

.login-error {
  margin-top: 12px; padding: 8px 12px; background: rgba(255,107,107,0.1);
  border: 1px solid rgba(255,107,107,0.3); color: #ff6b6b;
  font-family: 'Syne Mono', monospace; font-size: 0.62rem; display: none;
}
.login-error.visible { display: block; }
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBuwwcRdlxLf7-ZdmUAi0ajB5uL3y-m800",
  authDomain: "blzante-toolbox.firebaseapp.com",
  databaseURL: "https://blzante-toolbox-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "blzante-toolbox",
  storageBucket: "blzante-toolbox.firebasestorage.app",
  messagingSenderId: "599088931653",
  appId: "1:599088931653:web:34f936e8302e894afb942c"
});

const auth = firebase.auth();

// If already logged in, redirect
auth.onAuthStateChanged(user => {
  if (user) window.location.href = 'index.html';
});

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('visible');
}

// Email/Password login
document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const pwd = document.getElementById('password').value;
  if (!email || !pwd) { showError('Remplir email et mot de passe'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '⏳';
  try {
    await auth.signInWithEmailAndPassword(email, pwd);
    window.location.href = 'index.html';
  } catch(e) {
    const msgs = {
      'auth/user-not-found': 'Compte introuvable',
      'auth/wrong-password': 'Mot de passe incorrect',
      'auth/invalid-email': 'Email invalide',
      'auth/too-many-requests': 'Trop de tentatives, réessaie plus tard',
      'auth/invalid-credential': 'Email ou mot de passe incorrect',
    };
    showError(msgs[e.code] || 'Erreur : ' + e.message);
  } finally { btn.disabled = false; btn.textContent = 'Se connecter'; }
});

// Enter key
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

// Google login
document.getElementById('googleBtn').addEventListener('click', async () => {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
    window.location.href = 'index.html';
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user') showError('Erreur Google : ' + e.message);
  }
});
</script>
</body>
